        <div><div className="tx-dm" style={{marginBottom:2}}>Số giờ</div><input type="number" className="inp" id="lsH" defaultValue="1.5" min="0.25" step="0.25"/></div>
        <div><div className="tx-dm" style={{marginBottom:2}}>Ngày</div><input type="date" className="inp" id="lsD" defaultValue={TODAY}/></div>
      </div>
      <input className="inp" id="lsN" placeholder="Ghi chú..." style={{marginBottom:12}}/>
      <div style={{display:'flex',gap:7}}>
        <button className="btn-p" style={{flex:1,justifyContent:'center'}} onClick={()=>{const s=document.getElementById('lsS')?.value;const h=parseFloat(document.getElementById('lsH')?.value);const d=document.getElementById('lsD')?.value;const n=document.getElementById('lsN')?.value;if(!h||h<=0)return;const sub=[...data.courses,{id:'de',name:'Tiếng Đức'},{id:'en',name:'Tiếng Anh'},{id:'other',name:'Khác'}].find(c=>c.id===s);upd({studyLog:[{id:uid(),date:d||TODAY,subjectId:s,hours:h,subjectName:sub?.name||'',note:n},...data.studyLog]});setShowLog(false);}}>Lưu</button>
        <button className="btn-g" onClick={()=>setShowLog(false)}>Huỷ</button>
      </div>
    </div></div>}
    {/* PERFORMANCE REPORT */}
    <div className="card" style={{marginTop:12}}>
      <div className="lbl" style={{marginBottom:8}}>📋 BÁO CÁO TUẦN NÀY</div>
      {(()=>{
        const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().split('T')[0];});
        const dailyH=last7.map(ds=>({ds,h:data.studyLog.filter(l=>l.date===ds).reduce((s,l)=>s+l.hours,0),d:new Date(ds)}));
        const totalH=dailyH.reduce((s,d)=>s+d.h,0);
        const prevWeek=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-13+i);return d.toISOString().split('T')[0];});
        const prevH=data.studyLog.filter(l=>prevWeek.includes(l.date)).reduce((s,l)=>s+l.hours,0);
        const activH=data.habits.filter(h=>!h.archived);
        const habPct=activH.length>0?Math.round(last7.reduce((s,d)=>s+activH.filter(h=>h.completions[d]).length,0)/(activH.length*7)*100):0;
        const ratings=last7.map(d=>data.dailyPerf[d]?.rating).filter(Boolean);
        const avgRating=ratings.length>0?(ratings.reduce((s,r)=>s+r,0)/ratings.length).toFixed(1):null;
        const maxH=Math.max(...dailyH.map(d=>d.h),1);
        const diff=totalH-prevH;
        return<div>
          <div className="g3" style={{marginBottom:12}}>
            <div style={{textAlign:'center',background:'var(--sur)',borderRadius:8,padding:'8px'}}><div style={{fontSize:20,fontWeight:700,color:'var(--acc)'}}>{totalH.toFixed(1)}h</div><div className="tx-dm">tổng giờ học</div>{prevH>0&&<div style={{fontSize:10,color:diff>=0?'var(--su)':'var(--cr)',marginTop:2}}>{diff>=0?'+':''}{diff.toFixed(1)}h vs tuần trước</div>}</div>
            <div style={{textAlign:'center',background:'var(--sur)',borderRadius:8,padding:'8px'}}><div style={{fontSize:20,fontWeight:700,color:'#1D9E75'}}>{habPct}%</div><div className="tx-dm">habits hoàn thành</div></div>
            <div style={{textAlign:'center',background:'var(--sur)',borderRadius:8,padding:'8px'}}><div style={{fontSize:20,fontWeight:700,color:'var(--go)'}}>{avgRating?`${avgRating}⭐`:'-'}</div><div className="tx-dm">đánh giá TB</div></div>
          </div>
          {/* Daily bar chart */}
          <div style={{display:'flex',gap:4,alignItems:'flex-end',height:70,marginBottom:4}}>
            {dailyH.map(({ds,h,d})=><div key={ds} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <div style={{fontSize:9,color:'var(--dm)',fontWeight:600}}>{h>0?h.toFixed(1):''}</div>
              <div style={{width:'100%',background:ds===TODAY?'var(--acc)':'var(--sur)',borderRadius:'3px 3px 0 0',height:`${Math.max(4,h/maxH*50)}px`,border:`1px solid ${ds===TODAY?'var(--acc3)':'var(--bdr)'}`,transition:'height .3s'}}/>
              <div style={{fontSize:9,color:ds===TODAY?'var(--acc)':'var(--dm)'}}>{d.getDate()}/{d.getMonth()+1}</div>
            </div>)}
          </div>
          <div style={{fontSize:10,color:'var(--dm)',textAlign:'center'}}>📊 Giờ học mỗi ngày trong tuần (cột xanh = hôm nay)</div>
        </div>;
      })()}
    </div>
  </div>;}

  {id:'language',label:'Ngôn ngữ',emoji:'🌐',sec:'HỌC TẬP'},
  {id:'studylog',label:'Study Log',emoji:'📊',sec:'HỌC TẬP'},
  {id:'habits',label:'Habits',emoji:'✅',sec:'LIFESTYLE'},
  {id:'events',label:'Events',emoji:'🗓️',sec:'LIFESTYLE'},
  {id:'admin',label:'Admin Tasks',emoji:'🧹',sec:'LIFESTYLE'},
  {id:'parking',label:'Parking Lot',emoji:'🅿️',sec:'LIFESTYLE'},
  {id:'settings',label:'Cài đặt',emoji:'⚙️',sec:'HỆ THỐNG'},
];

function App(){
  const [user,setUser]=useState(null);const [data,setData]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);const [syncErr,setSyncErr]=useState(false);const [lastSync,setLastSync]=useState(null);
  const [page,setPage]=useState('dashboard');const [pageParams,setPageParams]=useState({});
  const saveTimer=useRef(null);const saving=useRef(false);const unsubRef=useRef(null);

  useEffect(()=>{
    if(!FB_ON){let saved=loadLocal();if(saved)saved=migrateToV6(saved);const d=saved||buildInit();setData(d);applyTheme(d.settings);setAuthLoading(false);setTimeout(()=>{const el=document.getElementById('loading');if(el)el.style.display='none';},300);return;}
    const unsub=_auth.onAuthStateChanged(async u=>{setUser(u);if(u){await loadFB(u.uid);}else{setData(null);}setAuthLoading(false);setTimeout(()=>{const el=document.getElementById('loading');if(el)el.style.display='none';},300);});
    return()=>unsub();
  },[]);

  const loadFB=async(uid)=>{try{const ref=_db.collection('users').doc(uid);const doc=await ref.get();let init=doc.exists&&doc.data().appData?JSON.parse(doc.data().appData):buildInit();init=migrateToV6(init);setData(init);applyTheme(init.settings);if(!doc.exists)await ref.set({appData:JSON.stringify(init),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});setLastSync(new Date());if(unsubRef.current)unsubRef.current();unsubRef.current=ref.onSnapshot(snap=>{if(!snap.exists||saving.current)return;try{const nd=migrateToV6(JSON.parse(snap.data().appData));setData(nd);applyTheme(nd.settings);setLastSync(new Date());setSyncErr(false);}catch(e){}});}catch(e){setSyncErr(true);console.error(e);}};
  const doSave=async(uid,d)=>{saving.current=true;setSyncing(true);setSyncErr(false);try{await _db.collection('users').doc(uid).set({appData:JSON.stringify(d),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});setLastSync(new Date());}catch(e){setSyncErr(true);}finally{setTimeout(()=>{saving.current=false;},2500);setSyncing(false);}};

  const upd=useCallback((changes)=>{setData(d=>{const nd={...d,...changes};if(FB_ON&&user){if(saveTimer.current)clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>doSave(user.uid,nd),1500);}else saveLocal(nd);return nd;});},[user]);

  const awardXP=useCallback((amount,label)=>{showXpPop(amount);setData(d=>{const g={...d.gamification,xp:(d.gamification?.xp||0)+amount};const achs=[...(g.achievements||[])];if(!achs.includes('first_log')&&label?.includes('⏱️')){achs.push('first_log');showAch(ACH.find(a=>a.id==='first_log'));}const nd={...d,gamification:{...g,achievements:achs}};if(FB_ON&&user){if(saveTimer.current)clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>doSave(user.uid,nd),1500);}else saveLocal(nd);return nd;});},[user]);

  const signIn=()=>{const p=new firebase.auth.GoogleAuthProvider();_auth.signInWithPopup(p).catch(e=>console.error(e));};
  const signOut=()=>{if(unsubRef.current)unsubRef.current();_auth.signOut();setUser(null);setData(null);};
  const nav=(pg,params={})=>{setPage(pg);setPageParams(params);};

  if(authLoading)return null;
  if(FB_ON&&!user)return<SignInPage onSignIn={signIn}/>;
  if(!data)return null;

  const sections={};PAGES.forEach(p=>{if(!sections[p.sec])sections[p.sec]=[];sections[p.sec].push(p);});
  const cp=PAGES.find(p=>p.id===page);
  const xp=data.gamification?.xp||0;const lv=getLevel(xp);
  const nlv=LEVELS.find(l=>l.level===lv.level+1)||lv;
  const xpP=Math.min(100,Math.round((xp-lv.min)/(nlv.min-lv.min)*100));
  const critCount=data.courses.filter(c=>c.risk==='critical').length;
  const hMissed=data.habits.filter(h=>!h.archived&&!h.completions[TODAY]).length;

  function renderPage(){
    if(page==='dashboard')return<DashboardPage data={data} upd={upd} nav={nav} awardXP={awardXP}/>;
    if(page==='phase')return<PhasePage data={data} upd={upd}/>;
    if(page==='timeline')return<TimelinePage data={data}/>;
    if(page==='timer')return<TimerPage data={data} upd={upd} awardXP={awardXP}/>;
    if(page==='courses')return<CoursesPage data={data} upd={upd} initCourseId={pageParams.courseId}/>;
    if(page==='language')return<LanguagePage data={data} upd={upd}/>;
    if(page==='studylog')return<StudyLogPage data={data} upd={upd}/>;
    if(page==='habits')return<HabitsPage data={data} upd={upd}/>;
    if(page==='admin')return<AdminPage data={data} upd={upd}/>;
    if(page==='events')return<EventsPage data={data} upd={upd}/>;
    if(page==='settings')return<SettingsPage data={data} upd={upd}/>;
    if(page==='parking')return<ParkingLotPage data={data} upd={upd}/>;
  }

  return<div className="app">
    <div className="sb">
      <div className="sb-logo">
        <div className="sb-title">⚡ StudyOS <span style={{fontSize:9,background:'var(--acc2)',color:'var(--acc)',borderRadius:3,padding:'1px 4px'}}>v7</span></div>
        <div style={{marginTop:7}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}><span style={{fontSize:13}}>{lv.emoji}</span><span style={{fontSize:11,fontWeight:600,color:'var(--tx)'}}>Lv.{lv.level} {lv.name}</span><span style={{fontSize:10,color:'var(--mu)',marginLeft:'auto'}}>{xp} XP</span></div>
          <div className="xp-bar"><div className="xp-fill" style={{width:`${xpP}%`,background:'linear-gradient(90deg,var(--acc),#B06EF5)'}}/></div>
          <div className="xp-info"><span>{xp-lv.min}</span><span>/{nlv.min-lv.min}</span></div>
        </div>
      </div>
      <div style={{flex:1,paddingBottom:8}}>
        {Object.entries(sections).map(([sec,pages])=><div key={sec}>
          <div className="sb-sec">{sec}</div>
          {pages.map(p=>{let badge=null;
            if(p.id==='courses'&&critCount>0)badge=<span style={{marginLeft:'auto',background:'var(--cr)',color:'#fff',borderRadius:9,padding:'1px 5px',fontSize:9,fontWeight:700}}>{critCount}</span>;
            if(p.id==='habits'&&hMissed>0)badge=<span style={{marginLeft:'auto',background:'var(--wa)',color:'#fff',borderRadius:9,padding:'1px 5px',fontSize:9,fontWeight:700}}>{hMissed}</span>;
            if(p.id==='events'){const up=data.events.filter(e=>e.date>=TODAY).length;if(up>0)badge=<span style={{marginLeft:'auto',color:'var(--mu)',fontSize:10}}>{up}</span>;}
            if(p.id==='parking'&&data.parkingLot.length>0)badge=<span style={{marginLeft:'auto',color:'var(--dm)',fontSize:10}}>{data.parkingLot.length}</span>;
            return<button key={p.id} className={`nav ${page===p.id?'on':''}`} onClick={()=>nav(p.id)}>
              <span style={{fontSize:14,width:18,textAlign:'center',flexShrink:0}}>{p.emoji}</span>{p.label}{badge}
            </button>;})}
        </div>)}
      </div>
      <div style={{padding:'8px 12px',borderTop:'1px solid var(--bdr)'}}>
        {FB_ON&&user&&<div>
          <div style={{fontSize:10,color:'var(--mu)',marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>👤 {user.displayName||user.email}</div>
          <div style={{display:'flex',alignItems:'center',fontSize:10,color:'var(--mu)',marginBottom:5}}>
            <div className={`sync-dot ${syncing?'pulsing':''}`} style={{background:syncErr?'var(--cr)':syncing?'var(--wa)':'var(--su)'}}/>
            {syncErr?'Lỗi sync':syncing?'Đang sync...':lastSync?`${lastSync.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}`:''}
          </div>
          <button className="btn-g" style={{padding:'3px 8px',fontSize:10,width:'100%',justifyContent:'center'}} onClick={signOut}>Đăng xuất</button>
        </div>}
        {!FB_ON&&<div style={{fontSize:10,color:'var(--dm)'}}>⚠️ Chưa cấu hình Firebase</div>}
      </div>
    </div>
    <div className="main">
      <div className="mhd">
        <div style={{fontSize:14,fontWeight:500}}>{cp?.emoji} {cp?.label}</div>
        <div style={{fontSize:11,color:'var(--mu)'}}>{new Date().toLocaleDateString('vi-VN',{day:'numeric',month:'numeric',year:'numeric'})}</div>
      </div>
      <div className="scroll"><div className="content">{renderPage()}</div></div>
    </div>
  </div>;}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
