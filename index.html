        <div className="flex-sb" style={{cursor:'pointer'}} onClick={()=>!isRenaming&&togSec(sec.name)}>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <span style={{fontSize:12,color:'var(--dm)'}}>{isOpen?'▼':'▶'}</span>
            {isRenaming?<input className="inp" value={editSecName.new} onChange={e=>setEditSecName(p=>({...p,new:e.target.value}))} onClick={e=>e.stopPropagation()} autoFocus onKeyDown={e=>{if(e.key==='Enter')renameSection(sec.name,editSecName.new);if(e.key==='Escape')setEditSecName(null);}} style={{fontSize:12,padding:'3px 7px',width:140}}/>
            :<div style={{fontSize:13,fontWeight:700,color:'var(--tx)',letterSpacing:'.01em'}}>📚 {sec.name}</div>}
            <span style={{fontSize:10,color:sd===st.length&&st.length>0?'var(--su)':'var(--mu)'}}>{sd}/{st.length} ✓</span>
          </div>
          <div style={{display:'flex',gap:5,alignItems:'center'}} onClick={e=>e.stopPropagation()}>
            {nd&&!isOpen&&<span style={{fontSize:9,color:daysTo(nd.dueDate)<=3?'var(--cr)':'var(--wa)'}}>⏰{fmt(nd.dueDate)}</span>}
            {isRenaming?<><button className="btn-p btn-sm" onClick={e=>{e.stopPropagation();renameSection(sec.name,editSecName.new);}}>✓</button><button className="btn-g btn-sm" onClick={e=>{e.stopPropagation();setEditSecName(null);}}>✕</button></>
            :<>{delSecConfirm===sec.name
              ?<><button className="btn-g btn-sm" style={{background:'var(--crb)',color:'var(--cr)',borderColor:'var(--crBdr)',fontSize:10}} onClick={e=>{e.stopPropagation();deleteSection(sec.name);}}>Xoá!</button><button className="btn-g btn-sm" onClick={e=>{e.stopPropagation();setDelSecConfirm(null);}}>✕</button></>
              :<><button onClick={e=>{e.stopPropagation();setEditSecName({old:sec.name,new:sec.name});}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:11,opacity:.5}}>✏️</button>
              <button onClick={e=>{e.stopPropagation();setDelSecConfirm(sec.name);}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--cr)',fontSize:12,opacity:.6}}>🗑️</button></> }</>}
          </div>
        </div>
        {isOpen&&<div style={{marginTop:8}}>
          {st.length===0&&<div className="tx-dm" style={{padding:'6px 0'}}>Section này chưa có topic nào</div>}
          {st.map((tp,i)=><div key={tp.id} style={{borderBottom:i<st.length-1?'1px solid rgba(37,45,74,.4)':'none'}}>
            <TopicRow topic={tp} courseColor={course.color}
              onToggle={()=>updTopic(tp.id,{done:!tp.done})}
              onDelete={()=>upd({topics:course.topics.filter(t=>t.id!==tp.id)})}
              onEdit={(changes)=>updTopic(tp.id,changes)}
              onToggleSub={(subId)=>togSubtask(tp.id,subId)}
              onAddSub={(text,dueDate)=>addSubtask(tp.id,text,dueDate)}
              onEditSub={(subId,text,dueDate)=>editSubtask(tp.id,subId,text,dueDate)}
              onDeleteSub={(subId)=>delSubtask(tp.id,subId)}
              onMoveUp={i>0?()=>moveTopicInSec(sec.name,i,-1):null}
              onMoveDown={i<st.length-1?()=>moveTopicInSec(sec.name,i,1):null}/>
          </div>)}
          <input className="inp" placeholder={`+ Topic mới vào ${sec.name} (Enter)...`} style={{marginTop:6,fontSize:11,padding:'5px 8px'}}
            onKeyDown={e=>{if(e.key==='Enter'&&e.target.value.trim()){upd({sections,topics:[...course.topics,{id:uid(),label:e.target.value.trim(),sec:sec.name,done:false,dueDate:'',subtasks:[]}]});e.target.value='';}}}/>
        </div>}
      </div>;
    })}

    {/* BLOCK 2: LỊCH HỌC */}
    <CourseScheduleView course={course}/>

    {/* BLOCK 3: TASKS */}
    <div className="card" style={{marginBottom:9}}>
      <div className="lbl" style={{marginBottom:8}}>✅ TASKS</div>
      {course.tasks.map((task,i)=>{
        const isEditing=editTask?.id===task.id;const dd=task.dueDate?daysTo(task.dueDate):null;
        if(isEditing)return<div key={task.id} style={{padding:'6px 0',borderBottom:i<course.tasks.length-1?'1px solid rgba(37,45,74,.4)':'none'}}>
          <input className="inp" value={editTask.text} onChange={e=>setEditTask(p=>({...p,text:e.target.value}))} style={{marginBottom:5,fontSize:12}}/>
          <div style={{display:'flex',gap:5}}>
            <input type="date" className="inp" value={editTask.dueDate||''} onChange={e=>setEditTask(p=>({...p,dueDate:e.target.value}))} style={{flex:1,fontSize:11}}/>
            <input type="time" className="inp" value={editTask.dueTime||''} onChange={e=>setEditTask(p=>({...p,dueTime:e.target.value}))} style={{width:80,fontSize:11}}/>
            <button className="btn-p btn-sm" onClick={saveTask}>✓</button>
            <button className="btn-g btn-sm" onClick={()=>setEditTask(null)}>✕</button>
          </div>
        </div>;
        return<div key={task.id} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 0',borderBottom:i<course.tasks.length-1?'1px solid rgba(37,45,74,.4)':'none'}}>
          <button onClick={()=>moveTask(i,-1)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:10,opacity:.4}}>↑</button>
          <button onClick={()=>moveTask(i,1)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:10,opacity:.4}}>↓</button>
          <Tick done={task.done} color="#1D9E75" onClick={()=>upd({tasks:course.tasks.map(t=>t.id===task.id?{...t,done:!t.done}:t)})}/>
          <span style={{flex:1,fontSize:12,textDecoration:task.done?'line-through':'none',opacity:task.done?.5:1}}>{task.text}</span>
          {task.dueDate&&!task.done&&<span style={{fontSize:10,color:dd<=0?'var(--cr)':dd<=2?'var(--wa)':'var(--dm)',whiteSpace:'nowrap'}}>{dd<=0?'Quá hạn!':fmt(task.dueDate)}</span>}
          <button onClick={()=>setEditTask({id:task.id,text:task.text,dueDate:task.dueDate||'',dueTime:task.dueTime||''})} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:11,opacity:.4}}>✏️</button>
          <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:12,opacity:.4}} onClick={()=>upd({tasks:course.tasks.filter(t=>t.id!==task.id)})}>×</button>
        </div>;
      })}
      <div style={{borderTop:'1px solid var(--bdr)',marginTop:7,paddingTop:7}}>
        <input className="inp" value={newTask} onChange={e=>setNewTask(e.target.value)} placeholder="Thêm task mới..." onKeyDown={e=>e.key==='Enter'&&addTask()} style={{marginBottom:5}}/>
        <div style={{display:'flex',gap:5}}>
          <input type="date" className="inp" value={newTaskDue} onChange={e=>setNewTaskDue(e.target.value)} style={{flex:1,fontSize:11}}/>
          <input type="time" className="inp" value={newTaskTime} onChange={e=>setNewTaskTime(e.target.value)} style={{width:80,fontSize:11}}/>
          <button className="btn-p btn-sm" onClick={addTask}>+ Thêm</button>
        </div>
      </div>
    </div>

    {/* BLOCK 4 & 5 */}
    <CourseGanttPhases course={course} onUpdate={upd}/>
    <CourseNotesBlock course={course} onUpdate={upd}/>

    {showEdit&&<CourseEditorModal existing={course} onSave={c=>{onUpdate(c);setShowEdit(false);}} onClose={()=>setShowEdit(false)}/>}
    {showDel&&<div className="ov" onClick={()=>setShowDel(false)}><div className="modal" style={{maxWidth:340,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:32,marginBottom:10}}>🗑️</div>
      <div style={{fontSize:14,fontWeight:500,marginBottom:6}}>Xoá môn học?</div>
      <div className="tx-mu" style={{marginBottom:18}}>Xoá <strong>{course.name}</strong>? Thao tác không thể hoàn tác.</div>
      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
        <button style={{background:'var(--crb)',color:'var(--cr)',border:'1px solid var(--crBdr)',borderRadius:8,padding:'7px 18px',cursor:'pointer',fontWeight:600}} onClick={()=>onDelete(course.id)}>Xoá</button>
        <button className="btn-g" onClick={()=>setShowDel(false)}>Huỷ</button>
      </div>
    </div></div>}
  </div>;}

function LanguagePage({data,upd}){
  const [weekOffset,setWeekOffset]=useState(0);
  const updateLang=(lid,changes)=>upd({languages:data.languages.map(l=>l.id!==lid?l:{...l,...changes})});

  const getWeekDates=(offset)=>{
    const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+offset*7);
    const dow=d.getDay();const m=new Date(d);m.setDate(d.getDate()-(dow===0?6:dow-1));
    return Array.from({length:7},(_,i)=>{const dd=new Date(m);dd.setDate(m.getDate()+i);return dd;});
  };

  const weekObjs=getWeekDates(weekOffset);
  const wd=weekObjs.map(d=>d.toISOString().split('T')[0]);
  const weekLabel=`${weekObjs[0].toLocaleDateString('vi-VN',{day:'numeric',month:'numeric'})} – ${weekObjs[6].toLocaleDateString('vi-VN',{day:'numeric',month:'numeric',year:'numeric'})}`;

  const tog=(lid,date,type)=>upd({languages:data.languages.map(l=>l.id!==lid?l:{...l,log:{...l.log,[`${date}_${type}`]:!l.log[`${date}_${type}`]}})});
  const setMin=(lid,date,v)=>upd({languages:data.languages.map(l=>l.id!==lid?l:{...l,log:{...l.log,[`${date}_self_min`]:v}})});

  return<div>
    <div className="h1">🌐 Ngôn ngữ</div>
    <p className="tx-mu" style={{marginBottom:14}}>Theo dõi học tập theo 4 kỹ năng: Ngữ pháp · Từ vựng · Nói · Viết</p>
    {data.languages.map(lang=>{
      const cats=lang.categories||defCats();
      const cd=wd.filter(d=>lang.log[`${d}_class`]).length;
      const st=wd.reduce((s,d)=>s+(lang.log[`${d}_self_min`]||0),0);
      const goal=lang.classDOW.length*90+lang.selfMin*7;
      const pv=Math.min(100,Math.round((st+cd*90)/goal*100));
      const vocab=cats.vocabulary||{total:0,weeklyGoal:50};
      const totalVocab=vocab.total||0;
      const grammarDone=cats.grammar?.items?.filter(i=>i.done).length||0;
      const speakingDone=cats.speaking?.items?.filter(i=>i.done).length||0;
      const writingDone=cats.writing?.items?.filter(i=>i.done).length||0;
      const cefrEntry=Object.entries(CEFR_VOCAB).find(([,v])=>totalVocab<v);
      const cefrNext=cefrEntry?cefrEntry:[null,null];
      return<div key={lang.id} className="card" style={{marginBottom:14}}>
        <div className="flex-sb" style={{marginBottom:10}}>
          <div style={{display:'flex',gap:9,alignItems:'center'}}><span style={{fontSize:24}}>{lang.emoji}</span><div><div style={{fontSize:14,fontWeight:600}}>{lang.name}</div><div className="tx-dm">{lang.level} → {lang.target}</div></div></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:15,fontWeight:600,color:lang.color}}>{pv}%</div><div className="tx-dm">tuần {weekOffset===0?'này':weekOffset===-1?'trước':weekOffset<0?`${-weekOffset} tuần trước`:''}</div></div>
        </div>
        {/* Stats row */}
        <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
          <div style={{background:'var(--sur)',borderRadius:6,padding:'5px 10px',textAlign:'center',flex:1}}>
            <div style={{fontSize:16,fontWeight:700,color:lang.color}}>{totalVocab}</div>
            <div className="tx-dm">từ vựng</div>
            {cefrNext[0]&&<div style={{fontSize:9,color:'var(--dm)'}}>→ {cefrNext[1]-totalVocab} đến {cefrNext[0]}</div>}
          </div>
          <div style={{background:'var(--sur)',borderRadius:6,padding:'5px 10px',textAlign:'center',flex:1}}><div style={{fontSize:16,fontWeight:600,color:lang.color}}>{grammarDone}</div><div className="tx-dm">ngữ pháp ✓</div></div>
          <div style={{background:'var(--sur)',borderRadius:6,padding:'5px 10px',textAlign:'center',flex:1}}><div style={{fontSize:16,fontWeight:600,color:lang.color}}>{speakingDone}</div><div className="tx-dm">topics nói ✓</div></div>
          <div style={{background:'var(--sur)',borderRadius:6,padding:'5px 10px',textAlign:'center',flex:1}}><div style={{fontSize:16,fontWeight:600,color:lang.color}}>{writingDone}</div><div className="tx-dm">bài viết ✓</div></div>
        </div>
        {/* Week navigation + attendance */}
        <div style={{background:'var(--sur)',borderRadius:8,padding:'9px',marginBottom:10}}>
          <div className="week-nav">
            <button className="btn-g btn-sm" onClick={()=>setWeekOffset(w=>w-1)}>‹ Tuần trước</button>
            <span style={{fontSize:11,fontWeight:600,color:weekOffset===0?'var(--acc)':'var(--tx)'}}>{weekLabel}</span>
            <button className="btn-g btn-sm" onClick={()=>setWeekOffset(w=>Math.min(0,w+1))} style={{opacity:weekOffset>=0?.3:1}} disabled={weekOffset>=0}>Tuần sau ›</button>
          </div>
          <div style={{overflowX:'auto'}}>
            <div style={{display:'grid',gridTemplateColumns:'90px repeat(7,1fr)',gap:3,alignItems:'center',minWidth:420}}>
              <div/>
              {weekObjs.map((d,i)=>{const ds=wd[i];return<div key={i} style={{textAlign:'center'}}>
                <div style={{fontSize:9,color:ds===TODAY?'var(--acc)':'var(--mu)',fontWeight:ds===TODAY?700:400}}>
                  {d.toLocaleDateString('vi-VN',{weekday:'short'})}
                </div>
                <div style={{fontSize:10,color:ds===TODAY?'var(--acc)':'var(--dm)',fontWeight:ds===TODAY?700:400}}>
                  {d.toLocaleDateString('vi-VN',{day:'numeric',month:'numeric'})}
                </div>
              </div>;})}
              <div style={{fontSize:11,color:'var(--mu)'}}>Lớp học ✓</div>
              {wd.map((date,i)=>{const isCd=lang.classDOW.includes(weekObjs[i].getDay());const done=lang.log[`${date}_class`];
              return<div key={date} style={{textAlign:'center'}}>
                {isCd?<div onClick={()=>tog(lang.id,date,'class')} style={{width:26,height:26,borderRadius:4,border:`1.5px solid ${done?lang.color:'var(--bdr)'}`,background:done?lang.color+'44':'transparent',cursor:'pointer',margin:'auto',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11}}>{done?'✓':''}</div>
                :<div style={{width:26,height:26,background:'var(--bg)',borderRadius:4,margin:'auto',opacity:.12}}/>}
              </div>;})}
              <div style={{fontSize:11,color:'var(--mu)'}}>Tự học (phút)</div>
              {wd.map(date=><div key={date}><input type="number" min={0} max={180} value={lang.log[`${date}_self_min`]||''} onChange={e=>setMin(lang.id,date,+e.target.value)} style={{width:30,background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:3,color:'var(--tx)',fontSize:10,padding:'2px 3px',textAlign:'center',outline:'none'}}/></div>)}
            </div>
          </div>
          <div style={{marginTop:6}}><Bar v={pv} color={lang.color} h={4}/><div className="tx-dm" style={{marginTop:2}}>{st+cd*90}/{goal} phút</div></div>
        </div>
        {/* Vocabulary block – counter only */}
        <div className="lang-cat">
          <div className="lang-cat-hd flex-sb" style={{marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:15}}>📝</span><span style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>Từ vựng</span>
              <span className="tx-dm">({totalVocab} từ tổng · 🎯 {vocab.weeklyGoal||50}/tuần)</span>
            </div>
          </div>
          <div className="vocab-box">
            <div style={{fontSize:40,fontWeight:800,color:lang.color,lineHeight:1}}>{totalVocab}</div>
            <div className="tx-dm" style={{margin:'4px 0 10px'}}>từ đã học</div>
            <div style={{display:'flex',gap:6,justifyContent:'center',flexWrap:'wrap'}}>
              {[1,5,10,25,50].map(n=><button key={n} className="btn-p btn-sm" onClick={()=>updateLang(lang.id,{categories:{...cats,vocabulary:{...vocab,total:(vocab.total||0)+n}}})}>{n>0?`+${n}`:n}</button>)}
              <button className="btn-g btn-sm" style={{color:'var(--cr)'}} onClick={()=>{if(vocab.total>0)updateLang(lang.id,{categories:{...cats,vocabulary:{...vocab,total:Math.max(0,(vocab.total||0)-1)}}});}}>-1</button>
            </div>
            <div style={{marginTop:8,fontSize:11,color:'var(--dm)'}}>
              {Object.entries(CEFR_VOCAB).map(([lv,min])=><span key={lv} style={{marginRight:8,color:totalVocab>=min?lang.color:'var(--dm)',fontWeight:totalVocab>=min?700:400}}>{totalVocab>=min?'✓':''}{lv}≥{min}</span>)}
            </div>
          </div>
        </div>
        {/* Grammar (with CEFR level chips), Speaking, Writing (with link) */}
        {[['grammar','📖','Ngữ pháp'],['speaking','🗣️','Nói'],['writing','✍️','Viết']].map(([catKey,emoji,label])=>{
          const catData=cats[catKey]||{items:[]};const items=catData.items||[];
          const done2=items.filter(i=>i.done).length;
          const [open,setOpen2]=[true,()=>{}]; // always open
          const addItem=(text,level,link)=>{
            const ni={id:uid(),text:text.trim(),done:false};
            if(catKey==='grammar')ni.level=level||'';
            if(catKey==='writing')ni.link=link||'';
            updateLang(lang.id,{categories:{...cats,[catKey]:{...catData,items:[...items,ni]}}});
          };
          const togItem=(id)=>updateLang(lang.id,{categories:{...cats,[catKey]:{...catData,items:items.map(i=>i.id===id?{...i,done:!i.done}:i)}}});
          const delItem=(id)=>updateLang(lang.id,{categories:{...cats,[catKey]:{...catData,items:items.filter(i=>i.id!==id)}}});
          const setItemLink=(id,link)=>updateLang(lang.id,{categories:{...cats,[catKey]:{...catData,items:items.map(i=>i.id===id?{...i,link}:i)}}});
          return<InlineCatSection key={catKey} catKey={catKey} emoji={emoji} label={label} lang={lang} items={items} done={done2} onToggle={togItem} onDelete={delItem} onAdd={addItem} onSetLink={setItemLink}/>;
        })}
        <div style={{marginTop:10,fontSize:11,color:'var(--mu)'}}>📅 <strong style={{color:'var(--tx)'}}>{lang.schedule}</strong> · {lang.resources.join(' · ')}</div>
      </div>;})}
  </div>;}

function InlineCatSection({catKey,emoji,label,lang,items,done,onToggle,onDelete,onAdd,onSetLink}){
  const [open,setOpen]=useState(true);const [newText,setNewText]=useState('');const [newLevel,setNewLevel]=useState('B1');const [newLink,setNewLink]=useState('');
  const doAdd=()=>{if(!newText.trim())return;onAdd(newText,newLevel,newLink);setNewText('');setNewLink('');};
  return<div className="lang-cat">
    <div className="lang-cat-hd flex-sb" style={{marginBottom:open?8:0}} onClick={()=>setOpen(o=>!o)}>
      <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{fontSize:15}}>{emoji}</span><span style={{fontSize:13,fontWeight:600,color:'var(--tx)'}}>{label}</span><span className="tx-dm">({done}/{items.length} ✓)</span></div>
      <span style={{fontSize:10,color:'var(--dm)'}}>{open?'▲':'▼'}</span>
    </div>
    {open&&<div>
      {items.map((item,i)=><div key={item.id} style={{padding:'5px 0',borderBottom:i<items.length-1?'1px solid rgba(37,45,74,.3)':'none'}}>
        <div style={{display:'flex',alignItems:'center',gap:7}}>
          <Tick done={item.done} color={lang.color} onClick={()=>onToggle(item.id)}/>
          {catKey==='grammar'&&item.level&&<span className="level-chip on" style={{background:lang.color+'33',color:lang.color,borderColor:lang.color+'55'}}>{item.level}</span>}
          <span style={{flex:1,fontSize:12,textDecoration:item.done?'line-through':'none',opacity:item.done?.5:1}}>{item.text}</span>
          {catKey==='writing'&&<button style={{background:'none',border:'none',cursor:'pointer',color:item.link?lang.color:'var(--dm)',fontSize:10,opacity:item.link?.8:.35}} onClick={()=>{if(item.link)window.open(item.link,'_blank');else{const u=prompt('Link bài viết:','https://');if(u)onSetLink(item.id,u);}}}>🔗</button>}
          <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:12,opacity:.35}} onClick={()=>onDelete(item.id)}>×</button>
        </div>
        {catKey==='writing'&&item.link&&<div style={{fontSize:10,color:lang.color,paddingLeft:24,marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}><a href={item.link} target="_blank" rel="noreferrer" style={{color:lang.color}}>{item.link}</a></div>}
      </div>)}
      <div style={{display:'flex',gap:5,marginTop:7,flexWrap:'wrap'}}>
        {catKey==='grammar'&&<select value={newLevel} onChange={e=>setNewLevel(e.target.value)} style={{background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:6,color:'var(--tx)',fontSize:11,padding:'4px 6px',outline:'none'}}>{CEFR_LEVELS.map(l=><option key={l} value={l}>{l}</option>)}</select>}
        <input className="inp" value={newText} onChange={e=>setNewText(e.target.value)} placeholder={catKey==='speaking'?'Topic đã luyện nói...':catKey==='writing'?'Tên bài viết...':'Điểm ngữ pháp...'}
          onKeyDown={e=>e.key==='Enter'&&doAdd()} style={{flex:1,fontSize:11,padding:'5px 8px'}}/>
        {catKey==='writing'&&<input className="inp" value={newLink} onChange={e=>setNewLink(e.target.value)} placeholder="Link (optional)..." style={{flex:1,fontSize:11,padding:'5px 8px'}}/>}
        <button className="btn-p btn-sm" onClick={doAdd}>+</button>
      </div>
    </div>}
  </div>;}

function HabitsPage({data,upd}){

      <div className="tx-dm" style={{marginBottom:5}}>Màu</div>
      <div style={{display:'flex',gap:6,marginBottom:14}}>{PAL.map((c,ci)=><div key={c} id={`hpal_${ci}`} onClick={()=>PAL.forEach((_,j)=>{const el=document.getElementById(`hpal_${j}`);if(el)el.style.border=j===ci?'3px solid #fff':'3px solid transparent';})} style={{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:'3px solid transparent'}}/>)}</div>
      <div style={{display:'flex',gap:8}}>
        <button className="btn-p" style={{flex:1,justifyContent:'center'}} onClick={()=>{const name=document.getElementById('hNm')?.value;const emoji=document.getElementById('hEm')?.value;if(!name?.trim())return;const ci=PAL.findIndex((_,j)=>document.getElementById(`hpal_${j}`)?.style.border!=='3px solid transparent');const col=ci>=0?PAL[ci]:PAL[0];upd({habits:[...data.habits,{id:uid(),name:name.trim(),emoji:emoji||'✅',color:col,completions:{},archived:false}]});setShowAdd(false);}}>Thêm</button>

        <button className="btn-g" onClick={()=>setShowLog(false)}>Huỷ</button>

    {/* PERFORMANCE REPORT */}

        const last7=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().split('T')[0];});
        const dailyH=last7.map(ds=>({ds,h:data.studyLog.filter(l=>l.date===ds).reduce((s,l)=>s+l.hours,0),d:new Date(ds)}));

        const prevH=data.studyLog.filter(l=>prevWeek.includes(l.date)).reduce((s,l)=>s+l.hours,0);

        const avgRating=ratings.length>0?(ratings.reduce((s,r)=>s+r,0)/ratings.length).toFixed(1):null;
        const maxH=Math.max(...dailyH.map(d=>d.h),1);

            <div style={{textAlign:'center',background:'var(--sur)',borderRadius:8,padding:'8px'}}><div style={{fontSize:20,fontWeight:700,color:'#1D9E75'}}>{habPct}%</div><div className="tx-dm">habits hoàn thành</div></div>
            <div style={{textAlign:'center',background:'var(--sur)',borderRadius:8,padding:'8px'}}><div style={{fontSize:20,fontWeight:700,color:'var(--go)'}}>{avgRating?`${avgRating}⭐`:'-'}</div><div className="tx-dm">đánh giá TB</div></div>
          </div>
          {/* Daily bar chart */}
          <div style={{display:'flex',gap:4,alignItems:'flex-end',height:70,marginBottom:4}}>
            {dailyH.map(({ds,h,d})=><div key={ds} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <div style={{fontSize:9,color:'var(--dm)',fontWeight:600}}>{h>0?h.toFixed(1):''}</div>
              <div style={{width:'100%',background:ds===TODAY?'var(--acc)':'var(--sur)',borderRadius:'3px 3px 0 0',height:`${Math.max(4,h/maxH*50)}px`,border:`1px solid ${ds===TODAY?'var(--acc3)':'var(--bdr)'}`,transition:'height .3s'}}/>
              <div style={{fontSize:9,color:ds===TODAY?'var(--acc)':'var(--dm)'}}>{d.getDate()}/{d.getMonth()+1}</div>
            </div>)}
          </div>
          <div style={{fontSize:10,color:'var(--dm)',textAlign:'center'}}>📊 Giờ học mỗi ngày trong tuần (cột xanh = hôm nay)</div>
        </div>;
      })()}
    </div>
  </div>;}

      </div>)}
    </div>}
    {upcoming.length>0&&<div><div className="lbl">SẮP TỚI — 45 NGÀY TỚI ({upcoming.length})</div>

        <div style={{width:36,height:36,borderRadius:7,background:(TC[e.type]||'#7C6EF5')+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0}}>{e.emoji}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:13,fontWeight:500}}>{e.title}{isRec&&<span style={{fontSize:9,marginLeft:5,color:'var(--dm)'}}>🔄</span>}</div>
          <div className="tx-dm">{fmtL(e.date)}{e.time&&` · ${e.time}`}{e.note&&` — ${e.note}`}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <span style={{padding:'2px 6px',borderRadius:4,fontSize:9,fontWeight:600,background:(TC[e.type]||'#7C6EF5')+'22',color:TC[e.type]||'#7C6EF5'}}>{TL[e.type]}</span>
          <div style={{fontSize:11,color:d===0?'var(--cr)':d<=7?'var(--wa)':'var(--mu)',marginTop:3}}>{d===0?'Hôm nay!':`${d} ngày`}</div>
        </div>
        {!isRec&&<div style={{display:'flex',flexDirection:'column',gap:3}}>

        </div>}
      </div>;})}
    </div>}
    {past.length>0&&<div style={{marginTop:12,opacity:.65}}><div className="lbl">ĐÃ QUA ({past.length})</div>
      {past.slice(-8).reverse().map(e=><div key={e.id} style={{display:'flex',gap:8,alignItems:'center',padding:'6px 0',borderBottom:'1px solid rgba(37,45,74,.3)'}}>
        <span style={{fontSize:14}}>{e.emoji}</span>
        <div style={{flex:1}}><div style={{fontSize:12,textDecoration:'line-through',color:'var(--mu)'}}>{e.title}</div><div className="tx-dm">{fmt(e.date)}</div></div>
        <button onClick={()=>setEditEv(e)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:11,opacity:.4}}>✏️</button>
        <button onClick={()=>upd({events:data.events.filter(x=>x.id!==e.id)})} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:13,opacity:.4}}>×</button>
      </div>)}

    {showAdd&&<AddEventModal onSave={e=>{upd({events:[...data.events,e]});setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
    {editEv&&<AddEventModal existing={editEv} onSave={e=>{upd({events:data.events.map(x=>x.id===e.id?e:x)});setEditEv(null);}} onClose={()=>setEditEv(null)}/>}
  </div>;}

function ParkingLotPage({data,upd}){
  const [tab,setTab]=useState('tasks');
  const [showAddTask,setShowAddTask]=useState(false);
  const [showAddNote,setShowAddNote]=useState(false);
  const [editTask,setEditTask]=useState(null);
  const [editNote,setEditNote]=useState(null);
  const [catFilter,setCatFilter]=useState('all');
  const [newCat,setNewCat]=useState('');const [showCatMgr,setShowCatMgr]=useState(false);
  const [showDone,setShowDone]=useState(false);
  // Form state at top level (fixes Rules of Hooks)
  const [taskForm,setTaskForm]=useState({text:'',category:'Khác',deadline:''});
  const [noteForm,setNoteForm]=useState({title:'',content:'',color:'#1A2038',noteType:'text',todos:[]});
  const tf=(k,v)=>setTaskForm(p=>({...p,[k]:v}));
  const nf=(k,v)=>setNoteForm(p=>({...p,[k]:v}));

  const tasks=data.parkingTasks||[];const notes=data.parkingNotes||[];const cats=data.parkingCategories||['Ý tưởng','Cần làm','Học tập','Khác'];
  const undone=tasks.filter(t=>!t.done);const done=tasks.filter(t=>t.done);
  const filtered=catFilter==='all'?undone:undone.filter(t=>t.category===catFilter);
  const addTask=()=>{if(!taskForm.text.trim())return;upd({parkingTasks:[{id:uid(),...taskForm,done:false,date:TODAY},...tasks]});setTaskForm({text:'',category:cats[0]||'Khác',deadline:''});setShowAddTask(false);};
  const updTask=(id,ch)=>upd({parkingTasks:tasks.map(t=>t.id===id?{...t,...ch}:t)});
  const delTask=id=>upd({parkingTasks:tasks.filter(t=>t.id!==id)});
  const addNote=()=>{upd({parkingNotes:[{id:uid(),...noteForm,date:TODAY},...notes]});setNoteForm({title:'',content:'',color:'#1A2038',noteType:'text',todos:[]});setShowAddNote(false);};
  const updNote=(id,ch)=>upd({parkingNotes:notes.map(n=>n.id===id?{...n,...ch}:n)});
  const delNote=id=>upd({parkingNotes:notes.filter(n=>n.id!==id)});
  const togNoteTodo=(noteId,i)=>{const note=notes.find(n=>n.id===noteId);if(!note)return;updNote(noteId,{todos:note.todos.map((t,j)=>j===i?{...t,done:!t.done}:t)});};
  const NOTE_COLORS=[['#1A2038','Indigo'],['#2A1F3D','Violet'],['#1A2F26','Emerald'],['#2F2214','Amber'],['#1A252F','Teal'],['#2F1A22','Rose']];

      {tab==='notes'&&<button className="btn-p btn-sm" onClick={()=>{setNoteForm({title:'',content:'',color:'#1A2038',noteType:'text',todos:[]});setShowAddNote(true);}}>+ Note</button>}
    </div>
    <p className="tx-mu" style={{marginBottom:12}}>Dump ý tưởng, task và ghi chú — não rảnh để tập trung học.</p>
    <div style={{display:'flex',gap:7,marginBottom:14}}>
      {[['tasks',`✅ Tasks (${undone.length})`],['notes',`📝 Notes (${notes.length})`]].map(([k,l])=>
        <button key={k} onClick={()=>setTab(k)} style={{padding:'7px 16px',borderRadius:8,border:`1.5px solid ${tab===k?'var(--acc)':'var(--bdr)'}`,background:tab===k?'var(--acc2)':'var(--sur)',color:tab===k?'var(--acc)':'var(--mu)',cursor:'pointer',fontSize:12,fontWeight:tab===k?700:400}}>{l}</button>)}
    </div>

    {tab==='tasks'&&<div>
      <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:10,alignItems:'center'}}>
        {['all',...cats].map(c=><button key={c} onClick={()=>setCatFilter(c)} style={{padding:'4px 10px',borderRadius:6,border:`1px solid ${catFilter===c?'var(--acc)':'var(--bdr)'}`,background:catFilter===c?'var(--acc2)':'transparent',color:catFilter===c?'var(--acc)':'var(--mu)',cursor:'pointer',fontSize:11}}>{c==='all'?`🗂 Tất cả (${undone.length})`:c}</button>)}

      </div>
      {showCatMgr&&<div className="card" style={{marginBottom:10}}>
        <div className="flex-sb" style={{marginBottom:8}}><div className="lbl" style={{margin:0}}>Quản lý Categories</div><button className="btn-g btn-sm" onClick={()=>setShowCatMgr(false)}>✕</button></div>

      {done.length>0&&<div style={{marginTop:10}}>

          <span style={{flex:1,fontSize:12,textDecoration:'line-through'}}>{task.text}</span>
          <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--cr)',fontSize:13}} onClick={()=>delTask(task.id)}>×</button>
        </div>)}
      </div>}

    {tab==='notes'&&<div>

function StudyJournalPage({data,upd,nav}){
  const [showNew,setShowNew]=useState(false);
  const [newSubj,setNewSubj]=useState(data.courses[0]?.id||'other');
  const [planItems,setPlanItems]=useState([{id:uid(),text:'',status:'todo',src:'manual'}]);
  const [expandId,setExpandId]=useState(null);
  const allS=[...data.courses.filter(c=>!c.archived).map(c=>({id:c.id,name:c.name,emoji:c.emoji})),{id:'de',name:'Tiếng Đức',emoji:'🇩🇪'},{id:'en',name:'Tiếng Anh',emoji:'🇬🇧'},{id:'other',name:'Khác',emoji:'📌'}];
  const journal=data.studyJournal||[];
  const createSession=()=>{
    const s=allS.find(x=>x.id===newSubj);
    const entry={id:uid(),date:TODAY,subjectId:newSubj,subjectName:s?.name||'',subjectEmoji:s?.emoji||'📚',planItems:planItems.filter(p=>p.text.trim()),notes:'',hours:0};
    upd({studyJournal:[entry,...journal]});
    setShowNew(false);setPlanItems([{id:uid(),text:'',status:'todo',src:'manual'}]);setExpandId(entry.id);
  };
  const updEntry=(id,ch)=>upd({studyJournal:journal.map(e=>e.id===id?{...e,...ch}:e)});
  const updItem=(entryId,itemId,ch)=>updEntry(entryId,{planItems:journal.find(e=>e.id===entryId)?.planItems.map(p=>p.id===itemId?{...p,...ch}:p)||[]});
  const STATUS_CYCLE={'todo':'doing','doing':'done','done':'todo'};
  const STATUS_ICON={'todo':'○','doing':'◑','done':'✓'};
  const STATUS_COLOR={'todo':'var(--bdr)','doing':'var(--wa)','done':'var(--su)'};
  const pullTopics=(courseId)=>{const c=data.courses.find(x=>x.id===courseId);if(!c)return;const undone=c.topics.filter(t=>!t.done).slice(0,5).map(t=>({id:uid(),text:t.label,status:'todo',src:'topic',topicId:t.id}));setPlanItems(p=>[...p.filter(x=>x.src==='manual'&&x.text),...undone]);};
  return<div>
    <div className="flex-sb" style={{marginBottom:4}}><div className="h1">📓 Nhật ký tự học</div>
      <button className="btn-p btn-sm" onClick={()=>setShowNew(true)}>+ Phiên học mới</button>
    </div>
    <p className="tx-mu" style={{marginBottom:14}}>Lên kế hoạch trước khi học, ghi lại sau khi xong. Kết hợp với Timer để log giờ.</p>
    {journal.length===0&&<div style={{textAlign:'center',padding:'30px 0',color:'var(--dm)'}}>
      <div style={{fontSize:30,marginBottom:8}}>📓</div><div style={{fontSize:13}}>Chưa có phiên học nào. Nhấn "Phiên học mới" để bắt đầu!</div>
    </div>}
    {journal.map(entry=>{
      const isOpen=expandId===entry.id;
      const doneCount=(entry.planItems||[]).filter(p=>p.status==='done').length;
      const total=(entry.planItems||[]).length;
      return<div key={entry.id} className="card" style={{marginBottom:8}}>
        <div style={{display:'flex',gap:8,alignItems:'center',cursor:'pointer'}} onClick={()=>setExpandId(isOpen?null:entry.id)}>
          <span style={{fontSize:16}}>{entry.subjectEmoji||'📚'}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:13,fontWeight:500}}>{entry.subjectName}</div>
            <div className="tx-dm">{fmtL(entry.date)} {entry.hours>0&&`· ${entry.hours.toFixed(1)}h`} · {doneCount}/{total} tasks</div>
          </div>
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            {total>0&&<div style={{width:48,height:5,background:'var(--dm)',borderRadius:3,overflow:'hidden'}}><div style={{width:`${Math.round(doneCount/total*100)}%`,height:'100%',background:'var(--su)',borderRadius:3}}/></div>}
            <span style={{color:'var(--dm)',fontSize:12}}>{isOpen?'▲':'▼'}</span>
          </div>
        </div>
        {isOpen&&<div style={{marginTop:10,paddingTop:10,borderTop:'1px solid var(--bdr)'}}>
          <div className="lbl" style={{marginBottom:6}}>📋 KẾ HOẠCH / KẾT QUẢ</div>
          {(entry.planItems||[]).map(item=><div key={item.id} className="jitem">
            <div className="jstatus" style={{borderColor:STATUS_COLOR[item.status],background:item.status==='done'?'var(--su)':item.status==='doing'?'var(--wa)':'transparent',color:item.status!=='todo'?'#fff':'var(--dm)'}}
              onClick={()=>updItem(entry.id,item.id,{status:STATUS_CYCLE[item.status]})} title={item.status==='todo'?'Chưa làm':item.status==='doing'?'Đang làm':'Đã xong'}>
              {STATUS_ICON[item.status]}
            </div>
            <span style={{flex:1,fontSize:12,textDecoration:item.status==='done'?'line-through':'none',opacity:item.status==='done'?.6:1}}>{item.text}</span>
            {item.src==='topic'&&<span style={{fontSize:9,color:'var(--dm)',background:'var(--sur)',borderRadius:4,padding:'1px 4px'}}>📚</span>}
          </div>)}
          <div className="lbl" style={{margin:'10px 0 5px'}}>📝 GHI CHÚ SAU BUỔI HỌC</div>
          <textarea value={entry.notes||''} onChange={e=>updEntry(entry.id,{notes:e.target.value})} placeholder="Đã làm được gì? Vướng mắc ở đâu? Next steps là gì?..." rows={3}
            style={{width:'100%',background:'var(--sur)',border:'1px solid var(--bdr)',borderRadius:7,padding:'7px',color:'var(--tx)',fontSize:12,outline:'none',fontFamily:'inherit',resize:'vertical',boxSizing:'border-box'}}/>
          <div style={{display:'flex',gap:6,marginTop:8}}>
            <button className="btn-p btn-sm" onClick={()=>nav('timer')}>⏱️ Mở Timer</button>
            <button className="btn-g btn-sm" onClick={()=>upd({studyJournal:journal.filter(e=>e.id!==entry.id)})}>Xoá phiên</button>
          </div>
        </div>}
      </div>;})}
    {showNew&&<div className="ov" onClick={()=>setShowNew(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="flex-sb" style={{marginBottom:12}}><span style={{fontSize:14,fontWeight:500}}>📓 Phiên học mới</span><button className="btn-g btn-sm" onClick={()=>setShowNew(false)}>✕</button></div>
      <div className="tx-dm" style={{marginBottom:3}}>Môn học</div>
      <select className="sel" value={newSubj} onChange={e=>{setNewSubj(e.target.value);pullTopics(e.target.value);}} style={{marginBottom:10}}>
        {allS.map(s=><option key={s.id} value={s.id}>{s.emoji} {s.name}</option>)}
      </select>
      <div className="flex-sb" style={{marginBottom:6}}><div className="tx-dm">Kế hoạch cho buổi học</div>
        <button className="btn-g btn-sm" onClick={()=>pullTopics(newSubj)} style={{fontSize:10}}>📚 Lấy từ môn học</button>
      </div>
      {planItems.map((item,i)=><div key={item.id} style={{display:'flex',gap:5,marginBottom:5}}>
        <input className="inp" value={item.text} onChange={e=>setPlanItems(p=>p.map((x,j)=>j===i?{...x,text:e.target.value}:x))} placeholder={`Task ${i+1}...`} style={{flex:1,fontSize:12}}
          onKeyDown={e=>e.key==='Enter'&&setPlanItems(p=>[...p,{id:uid(),text:'',status:'todo',src:'manual'}])}/>
        <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:13}} onClick={()=>setPlanItems(p=>p.filter((_,j)=>j!==i))}>×</button>
      </div>)}
      <button className="btn-g btn-sm" style={{marginBottom:12}} onClick={()=>setPlanItems(p=>[...p,{id:uid(),text:'',status:'todo',src:'manual'}])}>+ Thêm task</button>
      <div style={{display:'flex',gap:8}}><button className="btn-p" style={{flex:1,justifyContent:'center'}} onClick={createSession}>Tạo phiên học</button><button className="btn-g" onClick={()=>setShowNew(false)}>Huỷ</button></div>
    </div></div>}
  </div>;}

function App(){
  const [user,setUser]=useState(null);const [data,setData]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);const [syncErr,setSyncErr]=useState(false);const [lastSync,setLastSync]=useState(null);
  const [page,setPage]=useState('dashboard');const [pageParams,setPageParams]=useState({});
  const [sbOpen,setSbOpen]=useState(true);         // ← V10: collapsible sidebar
  const [expandedNav,setExpandedNav]=useState({}); // ← V10: tree nav expanded state
  const saveTimer=useRef(null);const saving=useRef(false);const unsubRef=useRef(null);

  useEffect(()=>{
    if(!FB_ON){let saved=loadLocal();if(saved)saved=migrateToV6(saved);const d=saved||buildInit();setData(d);applyTheme(d.settings);setAuthLoading(false);setTimeout(()=>{const el=document.getElementById('loading');if(el)el.style.display='none';},300);return;}
    const unsub=_auth.onAuthStateChanged(async u=>{setUser(u);if(u){await loadFB(u.uid);}else{setData(null);}setAuthLoading(false);setTimeout(()=>{const el=document.getElementById('loading');if(el)el.style.display='none';},300);});
    return()=>unsub();
  },[]);

  const loadFB=async(uid)=>{try{const ref=_db.collection('users').doc(uid);const doc=await ref.get();let init=doc.exists&&doc.data().appData?JSON.parse(doc.data().appData):buildInit();init=migrateToV6(init);setData(init);applyTheme(init.settings);if(!doc.exists)await ref.set({appData:JSON.stringify(init),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});setLastSync(new Date());if(unsubRef.current)unsubRef.current();unsubRef.current=ref.onSnapshot(snap=>{if(!snap.exists||saving.current)return;try{const nd=migrateToV6(JSON.parse(snap.data().appData));setData(nd);applyTheme(nd.settings);setLastSync(new Date());setSyncErr(false);}catch(e){}});}catch(e){setSyncErr(true);console.error(e);}};
  const doSave=async(uid,d)=>{saving.current=true;setSyncing(true);setSyncErr(false);try{await _db.collection('users').doc(uid).set({appData:JSON.stringify(d),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});setLastSync(new Date());}catch(e){setSyncErr(true);}finally{setTimeout(()=>{saving.current=false;},2500);setSyncing(false);}};
  const upd=useCallback((changes)=>{setData(d=>{const nd={...d,...changes};if(FB_ON&&user){if(saveTimer.current)clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>doSave(user.uid,nd),1500);}else saveLocal(nd);return nd;});},[user]);
  const awardXP=useCallback((amount,label)=>{showXpPop(amount);setData(d=>{const g={...d.gamification,xp:(d.gamification?.xp||0)+amount};const achs=[...(g.achievements||[])];if(!achs.includes('first_log')&&label?.includes('⏱️')){achs.push('first_log');showAch(ACH.find(a=>a.id==='first_log'));}const nd={...d,gamification:{...g,achievements:achs}};if(FB_ON&&user){if(saveTimer.current)clearTimeout(saveTimer.current);saveTimer.current=setTimeout(()=>doSave(user.uid,nd),1500);}else saveLocal(nd);return nd;});},[user]);
  const signIn=()=>{const p=new firebase.auth.GoogleAuthProvider();_auth.signInWithPopup(p).catch(e=>console.error(e));};
  const signOut=()=>{if(unsubRef.current)unsubRef.current();_auth.signOut();setUser(null);setData(null);};
  const nav=(pg,params={})=>{setPage(pg);setPageParams(params);};
  const togNav=(id)=>setExpandedNav(p=>({...p,[id]:!p[id]}));

  if(authLoading)return null;
  if(FB_ON&&!user)return<SignInPage onSignIn={signIn}/>;
  if(!data)return null;

  const sections={};PAGES.forEach(p=>{if(!sections[p.sec])sections[p.sec]=[];sections[p.sec].push(p);});
  const cp=PAGES.find(p=>p.id===page);
  const xp=data.gamification?.xp||0;const lv=getLevel(xp);
  const nlv=LEVELS.find(l=>l.level===lv.level+1)||lv;
  const xpP=Math.min(100,Math.round((xp-lv.min)/(nlv.min-lv.min)*100));
  const critCount=data.courses.filter(c=>c.risk==='critical').length;
  const hMissed=data.habits.filter(h=>!h.archived&&!h.completions[TODAY]).length;
  const activeCourses=data.courses.filter(c=>!c.archived);

  function renderPage(){
    if(page==='dashboard')return<DashboardPage data={data} upd={upd} nav={nav} awardXP={awardXP}/>;
    if(page==='phase')return<PhasePage data={data} upd={upd}/>;
    if(page==='timeline')return<TimelinePage data={data}/>;
    if(page==='timer')return<TimerPage data={data} upd={upd} awardXP={awardXP} nav={nav}/>;
    if(page==='journal')return<StudyJournalPage data={data} upd={upd} nav={nav}/>;
    if(page==='courses')return<CoursesPage data={data} upd={upd} initCourseId={pageParams.courseId}/>;
    if(page==='language')return<LanguagePage data={data} upd={upd}/>;
    if(page==='studylog')return<StudyLogPage data={data} upd={upd}/>;
    if(page==='habits')return<HabitsPage data={data} upd={upd}/>;
    if(page==='admin')return<AdminPage data={data} upd={upd}/>;
    if(page==='events')return<EventsPage data={data} upd={upd}/>;
    if(page==='settings')return<SettingsPage data={data} upd={upd}/>;
    if(page==='parking')return<ParkingLotPage data={data} upd={upd}/>;
  }

  return<div className="app">
    <div className={`sb${sbOpen?'':' collapsed'}`}>
      <div className="sb-logo">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div className="sb-title">⚡<span className="sb-ver"> StudyOS <span style={{fontSize:9,background:'var(--acc2)',color:'var(--acc)',borderRadius:3,padding:'1px 4px'}}>v10</span></span></div>
          <button className="sb-toggle" onClick={()=>setSbOpen(o=>!o)} title={sbOpen?'Thu gọn sidebar':'Mở rộng sidebar'}>{sbOpen?'◀':'▶'}</button>
        </div>
        {sbOpen&&<div style={{marginTop:7}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}><span style={{fontSize:13}}>{lv.emoji}</span><span style={{fontSize:11,fontWeight:600,color:'var(--tx)'}}>Lv.{lv.level} {lv.name}</span><span style={{fontSize:10,color:'var(--mu)',marginLeft:'auto'}}>{xp} XP</span></div>
          <div className="xp-bar"><div className="xp-fill" style={{width:`${xpP}%`,background:'linear-gradient(90deg,var(--acc),#B06EF5)'}}/></div>
          <div className="xp-info"><span>{xp-lv.min}</span><span>/{nlv.min-lv.min}</span></div>
        </div>}
      </div>
      <div style={{flex:1,paddingBottom:8,overflowY:'auto'}}>
        {Object.entries(sections).map(([sec,pages])=><div key={sec}>
          {sbOpen&&<div className="sb-sec">{sec}</div>}
          {pages.map(p=>{
            let badge=null;
            if(p.id==='courses'&&critCount>0)badge=<span className="nav-badge" style={{marginLeft:'auto',background:'var(--cr)',color:'#fff',borderRadius:9,padding:'1px 5px',fontSize:9,fontWeight:700}}>{critCount}</span>;
            if(p.id==='habits'&&hMissed>0)badge=<span className="nav-badge" style={{marginLeft:'auto',background:'var(--wa)',color:'#fff',borderRadius:9,padding:'1px 5px',fontSize:9,fontWeight:700}}>{hMissed}</span>;
            if(p.id==='events'){const up=getUpcomingEvts(data.events,14).length;if(up>0)badge=<span className="nav-badge" style={{marginLeft:'auto',color:'var(--mu)',fontSize:10}}>{up}</span>;}
            if(p.id==='parking'){const total=(data.parkingTasks||[]).filter(t=>!t.done).length+(data.parkingNotes||[]).length;if(total>0)badge=<span className="nav-badge" style={{marginLeft:'auto',color:'var(--dm)',fontSize:10}}>{total}</span>;}
            const isCoursesExpanded=expandedNav['courses'];
            return<div key={p.id}>
              <button className={`nav ${page===p.id?'on':''}`} onClick={()=>{nav(p.id);if(p.id==='courses'&&sbOpen)togNav('courses');}}>
                <span style={{fontSize:14,width:18,textAlign:'center',flexShrink:0}}>{p.emoji}</span>
                <span className="sb-label">{p.label}</span>{badge}
                {p.id==='courses'&&sbOpen&&activeCourses.length>0&&<span style={{marginLeft:'auto',fontSize:10,color:'var(--dm)',opacity:.6}}>{isCoursesExpanded?'▲':'▼'}</span>}
              </button>
              {/* Tree sub-links for active courses */}
              {p.id==='courses'&&sbOpen&&isCoursesExpanded&&activeCourses.map(c=>
                <button key={c.id} className={`nav-sub${pageParams.courseId===c.id&&page==='courses'?' on':''}`}
                  onClick={()=>nav('courses',{courseId:c.id})}>
                  {c.emoji} {c.name}
                </button>)}
            </div>;})}
        </div>)}
      </div>
      <div style={{padding:'8px 12px',borderTop:'1px solid var(--bdr)'}}>
        {FB_ON&&user&&<div>
          {sbOpen&&<div className="sb-user" style={{fontSize:10,color:'var(--mu)',marginBottom:3,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>👤 {user.displayName||user.email}</div>}
          <div style={{display:'flex',alignItems:'center',fontSize:10,color:'var(--mu)',marginBottom:5}}>
            <div className={`sync-dot ${syncing?'pulsing':''}`} style={{background:syncErr?'var(--cr)':syncing?'var(--wa)':'var(--su)'}}/>
            {sbOpen&&(syncErr?'Lỗi sync':syncing?'Đang sync...':lastSync?`${lastSync.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}`:'')}</div>
          {sbOpen&&<button className="btn-g" style={{padding:'3px 8px',fontSize:10,width:'100%',justifyContent:'center'}} onClick={signOut}>Đăng xuất</button>}
        </div>}
        {!FB_ON&&sbOpen&&<div style={{fontSize:10,color:'var(--dm)'}}>⚠️ Chưa cấu hình Firebase</div>}
      </div>
    </div>
    <div className="main">
      <div className="mhd">
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {!sbOpen&&<button className="sb-toggle" onClick={()=>setSbOpen(true)} style={{fontSize:16}}>☰</button>}
          <div style={{fontSize:14,fontWeight:500}}>{cp?.emoji} {cp?.label}</div>
          {page==='courses'&&pageParams.courseId&&<button className="btn-g btn-sm" onClick={()=>nav('courses')} style={{marginLeft:4}}>← Danh sách môn</button>}
        </div>
        <div style={{fontSize:11,color:'var(--mu)'}}>{new Date().toLocaleDateString('vi-VN',{day:'numeric',month:'numeric',year:'numeric'})}</div>
      </div>
      <div className="scroll"><div className="content">{renderPage()}</div></div>
    </div>
  </div>;}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
