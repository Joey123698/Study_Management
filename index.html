<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C0F1A;--sur:#131729;--card:#1A2038;--ch:#1F2845;
  --bdr:#252D4A;--acc:#7C6EF5;--acc2:rgba(124,110,245,.13);--acc3:rgba(124,110,245,.28);
  --tx:#E4E8FA;--mu:#6B75A0;--dm:#353D60;
  --cr:#E24B4A;--crb:rgba(226,75,74,.1);--crBdr:rgba(226,75,74,.25);
  --wa:#BA7517;--wab:rgba(186,117,23,.1);--waBdr:rgba(186,117,23,.25);
  --su:#1D9E75;--sub:rgba(29,158,117,.1);--suBdr:rgba(29,158,117,.25);
  --in:#378ADD;--inb:rgba(55,138,221,.1);--inBdr:rgba(55,138,221,.25);
  --go:#F5A623;
}
body{background:var(--bg);color:var(--tx);font-family:var(--font,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif);overflow:hidden;height:100vh}
#root{height:100vh}
.app{display:flex;height:100vh}
.sb{width:215px;min-width:215px;background:var(--sur);border-right:1px solid var(--bdr);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sb-logo{padding:14px 14px 10px;border-bottom:1px solid var(--bdr)}
.sb-title{font-size:15px;font-weight:700;color:var(--acc);display:flex;align-items:center;gap:7px}
.xp-bar{height:5px;background:var(--dm);border-radius:3px;overflow:hidden;margin:5px 0 2px}
.xp-fill{height:100%;border-radius:3px;transition:width .5s ease}
.xp-info{display:flex;justify-content:space-between;font-size:9px;color:var(--dm)}
.sb-sec{padding:12px 12px 3px;font-size:9px;font-weight:700;color:var(--dm);letter-spacing:.08em;text-transform:uppercase}
.nav{display:flex;align-items:center;gap:8px;padding:7px 10px;margin:1px 5px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--mu);border:none;background:none;width:calc(100% - 10px);text-align:left;transition:all .12s}
.nav:hover{background:var(--card);color:var(--tx)}
.nav.on{background:var(--acc2);color:var(--acc);font-weight:500}
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.mhd{background:var(--sur);border-bottom:1px solid var(--bdr);padding:9px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.scroll{flex:1;overflow-y:auto;padding:20px 22px 60px}
.content{max-width:920px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:14px}
.card-sm{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:11px}
.lbl{font-size:10px;font-weight:700;color:var(--dm);letter-spacing:.07em;margin-bottom:6px;text-transform:uppercase}
.h1{font-size:20px;font-weight:500;margin-bottom:3px}
.tx-mu{color:var(--mu);font-size:12px}
.tx-dm{color:var(--dm);font-size:11px}
.btn-p{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:7px 13px;cursor:pointer;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
.btn-p:hover{opacity:.88}
.btn-g{background:var(--card);color:var(--mu);border:1px solid var(--bdr);border-radius:8px;padding:6px 11px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:5px}
.btn-g:hover{background:var(--ch);color:var(--tx)}
.btn-sm{padding:4px 9px!important;font-size:11px!important;border-radius:6px!important}
.inp{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:7px 10px;color:var(--tx);font-size:13px;outline:none;width:100%;font-family:inherit}
.inp:focus{border-color:var(--acc3)}
.sel{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;padding:7px 10px;color:var(--tx);font-size:13px;outline:none;width:100%;font-family:inherit}
.bar-w{background:var(--dm);border-radius:99px;overflow:hidden}
.bar-f{height:100%;border-radius:99px;transition:width .4s ease}
.badge{border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:.06em;white-space:nowrap}
.risk-cr{background:var(--crb);border-color:var(--crBdr)!important;color:var(--cr)}
.risk-wa{background:var(--wab);border-color:var(--waBdr)!important;color:var(--wa)}
.risk-in{background:var(--inb);border-color:var(--inBdr)!important;color:var(--in)}
.risk-su{background:var(--sub);border-color:var(--suBdr)!important;color:var(--su)}
.tick{width:17px;height:17px;border-radius:4px;border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .13s;flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.flex-sb{display:flex;align-items:center;justify-content:space-between}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hd{font-size:10px;color:var(--mu);text-align:center;padding:3px 0;font-weight:600}
.cal-cell{min-height:30px;padding:2px;border-radius:5px;cursor:pointer;text-align:center;font-size:11px;transition:background .1s}
.cal-cell:hover{background:var(--ch)}
.cal-cell.today{background:var(--acc2);color:var(--acc);font-weight:700;border:1px solid var(--acc3)}
.cal-cell.other-month{opacity:.25}
.cal-cell.selected{background:var(--acc3)}
.cal-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin:0 1px}
.cal-dots{display:flex;justify-content:center;gap:1px;margin-top:1px}
.tl2-row{display:flex;align-items:center;margin-bottom:8px}
.tl2-label{width:155px;min-width:155px;font-size:11px;color:var(--tx);padding-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl2-track{flex:1;height:22px;position:relative;background:var(--sur);border-radius:4px}
.tl2-bar{position:absolute;height:20px;top:1px;border-radius:4px;opacity:.8;display:flex;align-items:center;padding:0 5px;font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.tl2-exam{position:absolute;top:2px;width:18px;height:18px;border-radius:50%;background:var(--cr);z-index:4;display:flex;align-items:center;justify-content:center;font-size:9px;transform:translateX(-9px);cursor:pointer;border:2px solid var(--bg)}
.tl2-evt{position:absolute;top:2px;width:16px;height:16px;border-radius:4px;background:var(--acc);z-index:3;display:flex;align-items:center;justify-content:center;font-size:9px;transform:translateX(-8px);cursor:pointer;border:1px solid var(--bg)}
.tl2-today{position:absolute;top:-3px;bottom:-3px;width:2px;background:rgba(124,110,245,.7);z-index:5}
.tl2-wk{position:absolute;top:0;bottom:0;border-left:1px dashed var(--bdr)}
.hab-cell{width:26px;height:26px;border-radius:5px;border:1.5px solid var(--bdr);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;margin:auto;transition:all .13s}
.admin-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr)}
.timer-big{font-size:64px;font-weight:200;color:var(--acc);letter-spacing:-2px;text-align:center;padding:16px 0;font-variant-numeric:tabular-nums}
.t-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.xp-pop{position:fixed;top:70px;right:20px;background:var(--acc);color:#fff;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;z-index:9999;pointer-events:none;animation:xpF 2s ease forwards}
@keyframes xpF{0%{opacity:0;transform:translateY(0)}20%{opacity:1;transform:translateY(-8px)}80%{opacity:1;transform:translateY(-16px)}100%{opacity:0;transform:translateY(-24px)}}
.ach-pop{position:fixed;bottom:20px;right:20px;background:linear-gradient(135deg,#7C6EF5,#B06EF5);color:#fff;border-radius:12px;padding:14px 18px;z-index:9999;max-width:260px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:achS .4s ease}
@keyframes achS{from{transform:translateX(120px);opacity:0}to{transform:translateX(0);opacity:1}}
.perf-star{font-size:22px;cursor:pointer;transition:transform .1s;display:inline-block}
.perf-star:hover{transform:scale(1.2)}
.link-strip{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:20px;width:100%;max-height:85vh;overflow-y:auto}
.chart-wrap{position:relative;height:160px}
.log-entry{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--bdr)}
.m-dot{width:10px;height:10px;border-radius:50%;background:var(--acc);flex-shrink:0;margin-top:3px}
.m-dot.urg{background:var(--cr)}.m-dot.past{background:var(--su)}
.phase-card{border:1px solid var(--bdr);border-radius:12px;padding:14px;position:relative;overflow:hidden;margin-bottom:12px}
.phase-active{border-color:var(--acc3)!important}
.signin-wrap{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.g-btn{display:flex;align-items:center;gap:10px;background:#fff;color:#333;border:none;border-radius:10px;padding:12px 22px;cursor:pointer;font-size:14px;font-weight:500;margin:0 auto}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pulsing{animation:pulse 1.2s infinite}
.sub-indent{padding-left:20px;border-left:2px solid var(--bdr);margin-left:8px;margin-bottom:4px}
.lang-cat{border-top:1px solid var(--bdr);padding-top:10px;margin-top:10px}
.lang-cat-hd{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sched-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr)}
.cd-big{font-size:34px;font-weight:800;line-height:1}
.cd-ring{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.note-post{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.note-comment{background:var(--bg);border-radius:7px;padding:6px 9px;margin-top:5px;font-size:11px}
.gantt2-row{display:flex;align-items:center;margin-bottom:6px}
.gantt2-label{width:130px;min-width:130px;font-size:11px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:6px}
.gantt2-track{flex:1;height:24px;position:relative;background:var(--sur);border-radius:4px;cursor:pointer}
.gantt2-bar{position:absolute;height:18px;top:3px;border-radius:4px;opacity:.85;font-size:9px;color:#fff;display:flex;align-items:center;padding:0 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.level-chip{font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;border:1px solid var(--bdr);color:var(--mu);cursor:pointer;background:var(--sur)}
.level-chip.on{color:#fff}
.vocab-box{text-align:center;padding:14px;background:var(--sur);border-radius:10px}
.deadline-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr)}
.grade-pill{border-radius:8px;padding:6px 12px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.week-nav{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:8px}
.archived-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--sur);border-radius:8px;margin-bottom:6px;opacity:.75}
.note-card{border-radius:10px;padding:12px;margin-bottom:0;border:1px solid var(--bdr);position:relative;min-height:80px}
.note-card:hover .note-del{opacity:.7}
.note-del{opacity:0;transition:opacity .15s}
.ptask-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr)}
/* V10: Collapsible sidebar */
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:220px;min-width:220px;transition:width .2s,min-width .2s;overflow:hidden;display:flex;flex-direction:column;height:100vh;border-right:1px solid var(--bdr);background:var(--sur)}
.sb.collapsed{width:52px;min-width:52px}
.sb.collapsed .sb-label,.sb.collapsed .sb-sec,.sb.collapsed .xp-bar,.sb.collapsed .xp-info,.sb.collapsed .sb-ver,.sb.collapsed .sb-user{display:none}
.sb.collapsed .sb-title{font-size:0}
.sb.collapsed .nav{justify-content:center;padding:10px 0}
.sb.collapsed .nav-badge{display:none}
.sb-toggle{background:none;border:none;cursor:pointer;color:var(--dm);font-size:14px;padding:2px 4px;border-radius:4px;line-height:1;flex-shrink:0}
.sb-toggle:hover{background:var(--ch);color:var(--tx)}
.nav-sub{display:block;padding:5px 12px 5px 38px;font-size:11px;color:var(--mu);background:none;border:none;cursor:pointer;width:100%;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-sub:hover,.nav-sub.on{background:var(--ch);color:var(--acc)}
.nav-sub.on{color:var(--acc);font-weight:600}
/* V10: Compact course card (4-col) */
.course-mini{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:10px 10px 8px;cursor:pointer;position:relative;overflow:hidden;transition:background .15s}
.course-mini:hover{background:var(--ch)}
/* V10: Journal */
.jitem{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--bdr)}
.jstatus{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;flex-shrink:0}
::-webkit-scrollbar{width:5px;height:5px}
/* V11: Light "Cozy Sage" mode soft elevation */
.light-mode .card{box-shadow:0 1px 2px rgba(61,59,51,.05),0 3px 10px rgba(61,59,51,.045)}
.light-mode .modal{box-shadow:0 12px 40px rgba(61,59,51,.18)}
.light-mode .course-mini,.light-mode .note-card,.light-mode .ev-card{box-shadow:0 1px 2px rgba(61,59,51,.05),0 2px 8px rgba(61,59,51,.04)}
.light-mode .sb{box-shadow:1px 0 0 rgba(61,59,51,.04)}
body.light-mode{background:linear-gradient(180deg,#EDF1E3 0%,#E6ECDA 100%)}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dm);border-radius:3px}
</style>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;
const T=()=>toLocalDateStr(new Date());
// ← V10c FIX: toISOString() converts to UTC, causing date misalignment in non-UTC timezones
// (e.g. Germany UTC+1/+2: at 00:00-02:00 local time, UTC date is still yesterday).
// This helper uses LOCAL date components instead.
function toLocalDateStr(d){const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const day=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${day}`;}
function daysTo(ds){if(!ds)return null;return Math.ceil((new Date(ds)-new Date())/86400000);}
function fmt(ds){if(!ds)return'';return new Date(ds).toLocaleDateString('vi-VN',{day:'numeric',month:'short'});}
/* ── V11b: Auto-convert Google Drive share links to direct-viewable image URLs ──
   Drive share links (drive.google.com/file/d/ID/view) are HTML preview pages,
   not raw images — browsers can't render them in <img src>. This extracts the
   file ID and rewrites to the direct-content endpoint that actually serves the image. */
function toDirectImageUrl(url){
  if(!url)return url;
  const u=url.trim();
  // Pattern 1: https://drive.google.com/file/d/FILE_ID/view?...
  let m=u.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
  if(m)return `https://lh3.googleusercontent.com/d/${m[1]}=w1200`;
  // Pattern 2: https://drive.google.com/open?id=FILE_ID
  m=u.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
  if(m)return `https://lh3.googleusercontent.com/d/${m[1]}=w1200`;
  // Pattern 3: https://drive.google.com/uc?id=FILE_ID&export=...  (already semi-direct, but lh3 is more reliable)
  m=u.match(/drive\.google\.com\/uc\?.*[?&]id=([a-zA-Z0-9_-]+)/);
  if(m)return `https://lh3.googleusercontent.com/d/${m[1]}=w1200`;
  return u; // not a Drive link — pass through unchanged
}
function fmtL(ds){if(!ds)return'';return new Date(ds).toLocaleDateString('vi-VN',{weekday:'short',day:'numeric',month:'long'});}
function pct(a){if(!a?.length)return 0;return Math.round(a.filter(t=>t.done).length/a.length*100);}
function uid(){return'i'+Date.now()+Math.random().toString(36).slice(2,5);}
function weekDates(){const d=new Date();d.setHours(0,0,0,0);const dow=d.getDay();const m=new Date(d);m.setDate(d.getDate()-(dow===0?6:dow-1));return Array.from({length:7},(_,i)=>{const dd=new Date(m);dd.setDate(m.getDate()+i);return toLocalDateStr(dd);});}
function hStreak(comp){const d=new Date();let s=0;while(true){const k=toLocalDateStr(d);if(!comp[k])break;s++;d.setDate(d.getDate()-1);}return s;}
function fmtS(s){const h=Math.floor(s/3600);const m=Math.floor((s%3600)/60);const ss=s%60;return h>0?`${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;}
const TODAY=T();
const DV=['CN','T2','T3','T4','T5','T6','T7'];
const MV=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
const LEVELS=[{min:0,max:200,level:1,name:'Newbie',emoji:'🌱'},{min:200,max:500,level:2,name:'Student',emoji:'📖'},{min:500,max:1000,level:3,name:'Scholar',emoji:'🎓'},{min:1000,max:2000,level:4,name:'Analyst',emoji:'📊'},{min:2000,max:3500,level:5,name:'Expert',emoji:'⚡'},{min:3500,max:6000,level:6,name:'Master',emoji:'🏆'},{min:6000,max:99999,level:7,name:'Legend',emoji:'👑'}];
function getLevel(xp){return LEVELS.find(l=>xp>=l.min&&xp<l.max)||LEVELS[0];}

const FONTS={system:'-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif',inter:'"Inter",system-ui,sans-serif',outfit:'"Outfit",system-ui,sans-serif',space:'"Space Grotesk",system-ui,sans-serif',dm:'"DM Sans",system-ui,sans-serif'};
function applyTheme(settings){
  if(!settings)return;
  const t=THEMES[settings.theme||'purple']||THEMES.purple;
  Object.entries(t).filter(([k])=>k.startsWith('--')).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  document.documentElement.style.setProperty('--font',FONTS[settings.fontFamily||'system']||FONTS.system);
  document.body.classList.toggle('light-mode',t.mode==='light');
  document.body.classList.toggle('dark-mode',t.mode!=='light');
  let el=document.getElementById('br-override');
  if(!el){el=document.createElement('style');el.id='br-override';document.head.appendChild(el);}
  const br=settings.radius==='sharp'?'5px':settings.radius==='pill'?'20px':(t.mode==='light'?'16px':'12px');
  el.textContent=`.card,.modal{border-radius:${br}!important}.btn-p,.btn-g{border-radius:calc(${br}*.65)!important}.inp,.sel{border-radius:calc(${br}*.65)!important}`;
}

function defCats(){return{grammar:{items:[]},vocabulary:{total:0,weeklyGoal:50,log:{}},speaking:{items:[]},writing:{items:[]}};}
function migrateToV5(d){if(!d)return d;if(d.languages)d.languages=d.languages.map(l=>{if(!l.categories)l={...l,categories:defCats()};return l;});if(d.courses)d.courses=d.courses.map(c=>({...c,topics:(c.topics||[]).map(t=>t.subtasks?t:{...t,subtasks:[]})}));return d;}
function migrateToV6(d){
  if(!d)return d;
  d=migrateToV5(d);
  if(d.courses)d.courses=d.courses.map(c=>({
    ...c,
    archived:c.archived??false,
    ects:c.ects??6,
    grade:c.grade??null,
    notes:c.notes||[],
    phases:c.phases||[],
    tasks:(c.tasks||[]).map(t=>({...t,dueDate:t.dueDate??'',dueTime:t.dueTime??''}))
  }));
  if(d.languages)d.languages=d.languages.map(l=>{
    const cats=l.categories||defCats();
    const g=cats.grammar||{items:[]};
    const grammar={items:(g.items||[]).map(it=>({...it,level:it.level??''}))};
    let vocab=cats.vocabulary;
    if(!vocab||vocab.total===undefined){
      const oldCount=vocab?.count||0;
      vocab={total:oldCount,weeklyGoal:vocab?.weeklyGoal||50,log:{}};
    }
    const w=cats.writing||{items:[]};
    const writing={items:(w.items||[]).map(it=>({...it,link:it.link??''}))};
    return{...l,categories:{...cats,grammar,vocabulary:vocab,writing,speaking:cats.speaking||{items:[]}}};
  });
  if(!d.timerCategories)d.timerCategories=[];
  if(!d.settings)d.settings={theme:'purple',radius:'rounded',fontFamily:'system',bannerUrl:''};
  if(!d.settings.fontFamily)d.settings.fontFamily='system';
  if(!d.settings.bannerUrl)d.settings.bannerUrl='';
  // Migrate todayFocus → dailyFocus
  if(!d.dailyFocus){
    d.dailyFocus={};
    if(d.todayFocus){
      const old=d.todayFocus;
      d.dailyFocus[old.date||TODAY]={
        mustDo:{text:old.mustDo||'',done:false},
        top3:(old.top3||[]).map((t,i)=>({id:'t'+(i+1),text:t||'',done:false}))
      };
    }
    delete d.todayFocus;
  }
  // Migrate courses: add sections, instructor, contact, location
  if(d.courses)d.courses=d.courses.map(c=>{
    const updated={...c};
    if(!updated.instructor)updated.instructor='';
    if(!updated.contact)updated.contact='';
    if(!updated.location)updated.location='';
    if(!updated.sections){
      const secNames=[...new Set((c.topics||[]).map(t=>t.sec).filter(Boolean))];
      updated.sections=secNames.map((name,i)=>({id:'s'+(i+1),name}));
    }
    return updated;
  });
  if(d.phases)d.phases=d.phases.map(p=>({...p,goals:p.goals.map(g=>g.id==='g1'&&g.linkedTo==='course_completion'?{...g,type:'gpa',linkedTo:'gpa_auto'}:g)}));
  // V9 migrations
  if(!d.parkingTasks){d.parkingTasks=(d.parkingLot||[]).map(p=>({...p,category:'Khác',deadline:'',done:false}));}
  if(!d.parkingNotes)d.parkingNotes=[];
  if(!d.parkingCategories)d.parkingCategories=['Ý tưởng','Cần làm','Học tập','Công việc','Khác'];
  if(d.events)d.events=d.events.map(e=>({...e,shortLabel:e.shortLabel||'',recurring:e.recurring||false,recurringDow:e.recurringDow||[],recurringEndDate:e.recurringEndDate||''}));
  if(d.courses)d.courses=d.courses.map(c=>({...c,topics:(c.topics||[]).map(t=>({...t,subtasks:(t.subtasks||[]).map(s=>({...s,dueDate:s.dueDate||''}))}))}));
  if(!d.studyJournal)d.studyJournal=[];
  return d;
}

/* ── V9: RECURRING EVENT HELPERS ── */
function getEventsOnDate(events,date){
  const dow=new Date(date+'T12:00:00').getDay();
  return events.filter(e=>{
    if(e.date===date)return true;
    if(e.recurring&&(e.recurringDow||[]).includes(dow)){
      if(date<e.date)return false;
      if(e.recurringEndDate&&date>e.recurringEndDate)return false;
      return true;
    }
    return false;
  }).map(e=>e.date===date?e:{...e,date,id:`${e.id}_${date}`});
}
function getUpcomingEvts(events,days=45){
  const res=[];const seen=new Set();
  for(let i=0;i<days;i++){const d=new Date(TODAY+'T12:00:00');d.setDate(d.getDate()+i);const ds=toLocalDateStr(d);getEventsOnDate(events,ds).forEach(e=>{if(!seen.has(e.id)){seen.add(e.id);res.push(e);}});}
  return res;
}

/* ── V9: TOPIC ROW WITH SUBTASK EDIT + DEADLINE ── */
function TopicRow({topic,courseColor,onToggle,onDelete,onEdit,onToggleSub,onAddSub,onEditSub,onDeleteSub,onMoveUp,onMoveDown}){
  const [showList,setShowList]=useState(false);
  const [showInput,setShowInput]=useState(false);
  const [newSub,setNewSub]=useState('');
  const [newSubDate,setNewSubDate]=useState('');
  const [editing,setEditing]=useState(false);
  const [eLabel,setELabel]=useState(topic.label);const [eDue,setEDue]=useState(topic.dueDate||'');
  const [editSubId,setEditSubId]=useState(null);
  const [editSubText,setEditSubText]=useState('');
  const [editSubDate,setEditSubDate]=useState('');
  const subs=topic.subtasks||[];const subsDone=subs.filter(s=>s.done).length;
  const dd=topic.dueDate?daysTo(topic.dueDate):null;
  const addSub=()=>{if(!newSub.trim())return;onAddSub(newSub.trim(),newSubDate);setNewSub('');setNewSubDate('');setShowInput(false);};
  const saveEdit=()=>{if(!eLabel.trim())return;onEdit({label:eLabel.trim(),dueDate:eDue});setEditing(false);};
  if(editing)return<div style={{padding:'6px 0',background:'var(--sur)',borderRadius:6,marginBottom:2}}>
    <input className="inp" value={eLabel} onChange={e=>setELabel(e.target.value)} style={{marginBottom:5,fontSize:12}}/>
    <div style={{display:'flex',gap:6,alignItems:'center'}}>
      <input type="date" className="inp" value={eDue} onChange={e=>setEDue(e.target.value)} style={{fontSize:11,flex:1}}/>
      <button className="btn-p btn-sm" onClick={saveEdit}>✓</button>
      <button className="btn-g btn-sm" onClick={()=>setEditing(false)}>✕</button>
    </div>
  </div>;
  return<div>
    <div style={{display:'flex',alignItems:'center',gap:6,padding:'5px 0'}}>
      {onMoveUp&&<button onClick={onMoveUp} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:10,opacity:.4,padding:'0 1px'}}>↑</button>}
      {onMoveDown&&<button onClick={onMoveDown} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:10,opacity:.4,padding:'0 1px'}}>↓</button>}
      <Tick done={topic.done} color={courseColor} onClick={onToggle}/>
      <span style={{flex:1,fontSize:12,textDecoration:topic.done?'line-through':'none',opacity:topic.done?.5:1}}>{topic.label}{subs.length>0&&<span style={{fontSize:9,color:'var(--mu)',marginLeft:5}}>({subsDone}/{subs.length})</span>}</span>
      {topic.dueDate&&!topic.done&&<span style={{fontSize:10,color:dd<=0?'var(--cr)':dd<=3?'var(--wa)':'var(--dm)',whiteSpace:'nowrap'}}>{dd<=0?'Quá hạn!':fmt(topic.dueDate)}</span>}
      <button onClick={()=>{setShowList(s=>!s);setShowInput(false);}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:10,opacity:.5}}>{showList?'▲':'▼'}</button>
      <button onClick={()=>setEditing(true)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:11,opacity:.4}}>✏️</button>
      <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:12,opacity:.35}} onClick={onDelete}>×</button>
    </div>
    {showList&&<div className="sub-indent">
      {subs.length===0&&!showInput&&<div className="tx-dm" style={{fontSize:11,padding:'3px 0'}}>Chưa có subtask nào</div>}
      {subs.map(sub=>{
        const isEdSub=editSubId===sub.id;
        const subDD=sub.dueDate?daysTo(sub.dueDate):null;
        if(isEdSub)return<div key={sub.id} style={{background:'var(--sur)',borderRadius:7,padding:'7px',marginBottom:4,border:'1px solid var(--bdr)'}}>
          <input className="inp" value={editSubText} onChange={e=>setEditSubText(e.target.value)} style={{marginBottom:5,fontSize:11}} autoFocus onKeyDown={e=>e.key==='Escape'&&setEditSubId(null)}/>
          <div style={{display:'flex',gap:4}}>
            <input type="date" className="inp" value={editSubDate} onChange={e=>setEditSubDate(e.target.value)} style={{flex:1,fontSize:10}}/>
            <button className="btn-p btn-sm" onClick={()=>{if(onEditSub&&editSubText.trim())onEditSub(sub.id,editSubText.trim(),editSubDate);setEditSubId(null);}}>✓</button>
            <button className="btn-g btn-sm" onClick={()=>setEditSubId(null)}>✕</button>
          </div>
        </div>;
        return<div key={sub.id} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 0',borderBottom:'1px solid var(--bdr)'}}>
          <Tick done={sub.done} color={courseColor} onClick={()=>onToggleSub(sub.id)}/>
          <span style={{flex:1,fontSize:11,textDecoration:sub.done?'line-through':'none',opacity:sub.done?.5:1}}>{sub.text}</span>
          {sub.dueDate&&!sub.done&&<span style={{fontSize:9,color:subDD<=0?'var(--cr)':subDD<=3?'var(--wa)':'var(--dm)',whiteSpace:'nowrap'}}>{subDD<=0?'❗Quá hạn':fmt(sub.dueDate)}</span>}
          <button onClick={()=>{setEditSubId(sub.id);setEditSubText(sub.text);setEditSubDate(sub.dueDate||'');}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:10,opacity:.4}}>✏️</button>
          <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:12,opacity:.35}} onClick={()=>onDeleteSub(sub.id)}>×</button>
        </div>;
      })}
      {showInput?<div style={{marginTop:6,background:'var(--sur)',borderRadius:7,padding:'7px',border:'1px solid var(--bdr)'}}>
        <input className="inp" value={newSub} onChange={e=>setNewSub(e.target.value)} placeholder="Tên subtask..." autoFocus
          style={{marginBottom:5,fontSize:11}} onKeyDown={e=>{if(e.key==='Enter'&&!newSubDate)addSub();if(e.key==='Escape'){setShowInput(false);setNewSub('');setNewSubDate('');}}}/> 
        <div style={{display:'flex',gap:4}}>
          <input type="date" className="inp" value={newSubDate} onChange={e=>setNewSubDate(e.target.value)} style={{flex:1,fontSize:10}} placeholder="Deadline (tùy chọn)"/>
          <button className="btn-p btn-sm" onClick={addSub}>✓</button>
          <button className="btn-g btn-sm" onClick={()=>{setShowInput(false);setNewSub('');setNewSubDate('');}}>✕</button>
        </div>
      </div>:<button className="btn-g btn-sm" style={{marginTop:5,fontSize:10}} onClick={()=>setShowInput(true)}>+ Subtask</button>}
    </div>}
  </div>;}

/* ── V5 NEW: COURSE SCHEDULE VIEW ── */
function CourseScheduleView({course,onNav}){
  const topicsWithDue=course.topics.filter(t=>t.dueDate).sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  if(topicsWithDue.length===0)return<div className="card"><div className="tx-dm" style={{textAlign:'center',padding:'14px'}}>Chưa có topic nào có deadline. Thêm dueDate khi sửa topic để dùng tính năng này.</div></div>;
  const start=topicsWithDue[0]?new Date(topicsWithDue[0].dueDate):new Date();start.setHours(0,0,0,0);
  const startAct=new Date(Math.min(start.getTime(),new Date().getTime()));startAct.setHours(0,0,0,0);
  const endD=new Date(course.examDate||course.endDate||topicsWithDue[topicsWithDue.length-1]?.dueDate||'2026-07-31');endD.setHours(0,0,0,0);
  const totalMs=Math.max(1,endD-startAct);
  const todayPct=Math.max(0,Math.min(100,(new Date()-startAct)/totalMs*100));
  return<div className="card" style={{marginBottom:10}}>
    <div className="flex-sb" style={{marginBottom:6}}>
      <div className="lbl" style={{margin:0}}>📅 LỊCH HỌC THEO TOPIC</div>
      <div style={{display:'flex',gap:8,fontSize:10,color:'var(--mu)'}}><span style={{color:'var(--su)'}}>● Xong</span><span style={{color:course.color}}>● Đúng hạn</span><span style={{color:'var(--cr)'}}>● Quá hạn</span></div>
    </div>
    {/* Today indicator */}
    <div style={{position:'relative',height:22,marginBottom:8,marginLeft:24,marginRight:70}}>
      <div style={{position:'absolute',inset:'9px 0',background:'var(--dm)',borderRadius:2,opacity:.4}}/>
      <div style={{position:'absolute',left:`${todayPct}%`,top:0,bottom:0,width:2,background:'var(--acc)',borderRadius:1,transform:'translateX(-1px)'}}/>
      <div style={{position:'absolute',left:`${todayPct}%`,top:'-2px',transform:'translateX(-50%)',background:'var(--acc)',color:'#fff',fontSize:8,fontWeight:700,borderRadius:3,padding:'1px 4px',whiteSpace:'nowrap'}}>Hôm nay</div>
    </div>
    {topicsWithDue.map((t,i)=>{
      const d=new Date(t.dueDate);d.setHours(0,0,0,0);
      const pctPos=Math.max(0,Math.min(100,(d-startAct)/totalMs*100));
      const days=daysTo(t.dueDate);
      const dotColor=t.done?'var(--su)':days<=0?'var(--cr)':days<=3?'var(--wa)':course.color;
      const dayLabel=t.done?'✓ Xong':days<=0?`Quá hạn ${Math.abs(days)}N`:days===1?'Ngày mai':days<=7?`${days} ngày nữa`:fmt(t.dueDate);
      return<div key={t.id} className="sched-row">
        <div style={{width:16,height:16,borderRadius:3,border:`2px solid ${dotColor}`,background:t.done?dotColor:'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>{t.done&&<span style={{color:'#fff',fontSize:9,fontWeight:700}}>✓</span>}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,color:t.done?'var(--mu)':'var(--tx)',textDecoration:t.done?'line-through':'none',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.label}</div>
          <div style={{position:'relative',height:4,background:'var(--dm)',borderRadius:2,marginTop:3}}>
            {/* filled bar from start to deadline */}
            <div style={{position:'absolute',left:0,width:`${pctPos}%`,height:'100%',background:t.done?'var(--su)':days<=0?'var(--cr)':days<=3?'var(--wa)':'var(--bdr)',borderRadius:2,opacity:.6}}/>
            {/* today line on bar */}
            <div style={{position:'absolute',left:`${todayPct}%`,width:2,top:-2,bottom:-2,background:'var(--acc)',borderRadius:1,opacity:.8}}/>
            {/* deadline dot */}
            <div style={{position:'absolute',left:`${pctPos}%`,width:8,height:8,background:dotColor,borderRadius:'50%',top:-2,transform:'translateX(-4px)',border:'1.5px solid var(--bg)'}}/>
          </div>
        </div>
        <div style={{fontSize:10,color:dotColor,fontWeight:600,whiteSpace:'nowrap',minWidth:80,textAlign:'right'}}>{dayLabel}</div>
      </div>;})}
    <div style={{fontSize:9,color:'var(--dm)',marginTop:8,textAlign:'right'}}>Kết thúc: {fmt(toLocalDateStr(endD))} · còn {daysTo(toLocalDateStr(endD))} ngày</div>
  </div>;}

/* ── V10b/c: COURSE ATTENDANCE & SESSION NOTES ── */
function CourseAttendance({course,onUpdate}){
  const [weekOffset,setWeekOffset]=useState(0);
  const [expandDate,setExpandDate]=useState(null);
  const [showDowPicker,setShowDowPicker]=useState(false);
  const wd=weekDates();
  const baseWd=wd.map(d=>{const dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+weekOffset*7);return toLocalDateStr(dt);});
  const weekLabel=weekOffset===0?'Tuần này':`${weekOffset<0?Math.abs(weekOffset)+' tuần trước':''}`;
  const att=course.attendance||{};
  const scheduleDOW=course.scheduleDOW||[];
  const togAttend=(date)=>{const cur=att[date]||{attended:false,note:''};const na={...att,[date]:{...cur,attended:!cur.attended}};onUpdate({attendance:na});};
  const setNote=(date,note)=>onUpdate({attendance:{...att,[date]:{...(att[date]||{attended:false}),note}}});
  const togDow=(d)=>onUpdate({scheduleDOW:scheduleDOW.includes(d)?scheduleDOW.filter(x=>x!==d):[...scheduleDOW,d].sort()});
  const attendedCount=baseWd.filter(d=>att[d]?.attended).length;
  return<div className="card" style={{marginBottom:10}}>
    <div className="flex-sb" style={{marginBottom:8}}>
      <div className="lbl" style={{margin:0}}>📋 ĐIỂM DANH</div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <span style={{fontSize:11,color:'var(--su)',fontWeight:600}}>{attendedCount}/7</span>
        <button className="btn-g btn-sm" onClick={()=>setWeekOffset(w=>w-1)}>‹</button>
        <span style={{fontSize:10,color:weekOffset===0?'var(--acc)':'var(--tx)',fontWeight:weekOffset===0?600:400}}>{weekLabel}</span>
        <button className="btn-g btn-sm" onClick={()=>setWeekOffset(w=>Math.min(0,w+1))} disabled={weekOffset>=0} style={{opacity:weekOffset>=0?.3:1}}>›</button>
        <button className="btn-g btn-sm" onClick={()=>setShowDowPicker(s=>!s)} title="Cấu hình ngày học trong tuần">⚙️</button>
      </div>
    </div>
    {showDowPicker&&<div style={{background:'var(--sur)',borderRadius:8,padding:'8px',marginBottom:8}}>
      <div style={{fontSize:10,color:'var(--mu)',marginBottom:5}}>📅 Ngày học cố định trong tuần (để highlight) — bỏ chọn hết nếu đã kết thúc khóa trên lớp:</div>
      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
        {DV.map((d,i)=><button key={i} onClick={()=>togDow(i)} style={{width:30,height:30,borderRadius:6,border:`1.5px solid ${scheduleDOW.includes(i)?course.color:'var(--bdr)'}`,background:scheduleDOW.includes(i)?course.color+'22':'transparent',color:scheduleDOW.includes(i)?course.color:'var(--mu)',cursor:'pointer',fontSize:10,fontWeight:600}}>{d}</button>)}
      </div>
    </div>}
    <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:8}}>
      {baseWd.map(date=>{
        const dow=new Date(date+'T12:00:00').getDay();
        const isClassDay=scheduleDOW.includes(dow);
        const a=att[date]||{};const isT=date===TODAY;
        return<div key={date} style={{textAlign:'center'}}>
          <div style={{fontSize:9,color:isT?'var(--acc)':'var(--dm)',fontWeight:isT?700:400,marginBottom:2}}>
            {['CN','T2','T3','T4','T5','T6','T7'][dow]}
          </div>
          <div style={{fontSize:9,color:isT?'var(--acc)':'var(--dm)',marginBottom:4}}>
            {new Date(date+'T12:00:00').getDate()}/{new Date(date+'T12:00:00').getMonth()+1}
          </div>
          {/* V10c: any day clickable, class days get colored ring to indicate expected schedule */}
          <div onClick={()=>togAttend(date)} style={{width:28,height:28,borderRadius:6,
            border:`1.5px solid ${a.attended?course.color:isClassDay?course.color+'88':'var(--bdr)'}`,
            background:a.attended?course.color+'33':isClassDay?course.color+'10':'transparent',
            cursor:'pointer',margin:'auto',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,
            boxShadow:isT?`0 0 0 1.5px ${course.color}55`:'none'}}
            title={a.attended?'Đã đi học — click để bỏ':isClassDay?'Ngày học theo lịch — click để điểm danh':'Click để đánh dấu đi học'}>
            {a.attended?'✓':isClassDay?'·':''}
          </div>
          <div onClick={()=>setExpandDate(expandDate===date?null:date)}
            style={{fontSize:8,color:a.note?course.color:'var(--dm)',cursor:'pointer',marginTop:2,textAlign:'center',opacity:a.attended||a.note?1:.4}}>
            {a.note?'📝':'+ ghi'}
          </div>
        </div>;
      })}
    </div>
    {expandDate&&<div style={{background:'var(--sur)',borderRadius:8,padding:'8px',marginTop:4}}>
      <div style={{fontSize:10,color:'var(--mu)',marginBottom:4}}>📝 Nội dung buổi học {fmt(expandDate)}:</div>
      <textarea value={att[expandDate]?.note||''} onChange={e=>setNote(expandDate,e.target.value)}
        placeholder="Hôm nay học về nội dung gì? Điểm cần nhớ? Bài tập về nhà?..."
        rows={2} style={{width:'100%',background:'var(--card)',border:'1px solid var(--bdr)',borderRadius:6,padding:'6px',color:'var(--tx)',fontSize:11,outline:'none',fontFamily:'inherit',resize:'vertical',boxSizing:'border-box'}}/>
    </div>}
    {scheduleDOW.length===0&&<div className="tx-dm" style={{fontSize:10,marginTop:4}}>💡 Nhấn ⚙️ để đặt ngày học cố định trong tuần — vẫn có thể điểm danh tự do bất kỳ ngày nào.</div>}
  </div>;}

/* ── V6 NEW: COURSE NOTES & Q&A BLOCK ── */
function CourseNotesBlock({course,onUpdate}){
  const [text,setText]=useState('');
  const [commentText,setCommentText]=useState({});
  const notes=course.notes||[];
  const addNote=()=>{if(!text.trim())return;onUpdate({notes:[{id:uid(),text:text.trim(),date:TODAY,comments:[]},...notes]});setText('');};
  const delNote=(id)=>onUpdate({notes:notes.filter(n=>n.id!==id)});
  const addComment=(noteId)=>{const t=commentText[noteId];if(!t?.trim())return;onUpdate({notes:notes.map(n=>n.id===noteId?{...n,comments:[...(n.comments||[]),{id:uid(),text:t.trim(),date:TODAY}]}:n)});setCommentText(p=>({...p,[noteId]:''}));};
  const delComment=(noteId,cId)=>onUpdate({notes:notes.map(n=>n.id===noteId?{...n,comments:n.comments.filter(c=>c.id!==cId)}:n)});
  return<div className="card" style={{marginBottom:10}}>

function CourseGanttPhases({course,onUpdate}){
  const [showAdd,setShowAdd]=useState(false);
  const [f,setF]=useState({title:'',startDate:TODAY,endDate:TODAY,note:''});
  const phases=course.phases||[];
  const start=new Date();start.setHours(0,0,0,0);
  const end=new Date(course.examDate||course.endDate||'2026-07-31');
  const totalMs=Math.max(1,end-start);
  const pOf=(ds)=>{const d=new Date(ds);d.setHours(0,0,0,0);return Math.max(0,Math.min(100,(d-start)/totalMs*100));};
  const wOf=(s,e)=>Math.max(2,pOf(e)-pOf(s));
  const addPhase=()=>{if(!f.title.trim())return;onUpdate({phases:[...phases,{id:uid(),...f,color:PAL[phases.length%PAL.length]}]});setF({title:'',startDate:TODAY,endDate:TODAY,note:''});setShowAdd(false);};
  const delPhase=(id)=>onUpdate({phases:phases.filter(p=>p.id!==id)});
  return<div className="card" style={{marginBottom:10}}>
    <div className="flex-sb" style={{marginBottom:8}}>
      <div className="lbl" style={{margin:0}}>📊 GANTT — PHASE NHỎ TRONG MÔN</div>
      <button className="btn-g btn-sm" onClick={()=>setShowAdd(s=>!s)}>+ Thêm phase</button>
    </div>
    {showAdd&&<div style={{background:'var(--sur)',borderRadius:8,padding:'10px',marginBottom:10}}>
      <input className="inp" value={f.title} onChange={e=>setF(p=>({...p,title:e.target.value}))} placeholder="VD: Ôn Part A..." style={{marginBottom:6,fontSize:12}}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>
        <div><div className="tx-dm" style={{marginBottom:2}}>Bắt đầu</div><input type="date" className="inp" value={f.startDate} onChange={e=>setF(p=>({...p,startDate:e.target.value}))} style={{fontSize:11}}/></div>
        <div><div className="tx-dm" style={{marginBottom:2}}>Kết thúc</div><input type="date" className="inp" value={f.endDate} onChange={e=>setF(p=>({...p,endDate:e.target.value}))} style={{fontSize:11}}/></div>
      </div>
      <input className="inp" value={f.note} onChange={e=>setF(p=>({...p,note:e.target.value}))} placeholder="Ghi chú (optional)..." style={{marginBottom:8,fontSize:11}}/>
      <div style={{display:'flex',gap:6}}><button className="btn-p btn-sm" onClick={addPhase}>Thêm</button><button className="btn-g btn-sm" onClick={()=>setShowAdd(false)}>Huỷ</button></div>
    </div>}
    {phases.length===0&&!showAdd&&<div className="tx-dm" style={{textAlign:'center',padding:'10px'}}>Chưa có phase nào — bấm "+ Thêm phase" để tạo</div>}
    {phases.map(p=><div key={p.id} className="gantt2-row">
      <div className="gantt2-label" title={p.note}>{p.title}</div>
      <div className="gantt2-track">
        <div className="gantt2-bar" style={{left:`${pOf(p.startDate)}%`,width:`${wOf(p.startDate,p.endDate)}%`,background:p.color}} title={`${fmt(p.startDate)} → ${fmt(p.endDate)}${p.note?' · '+p.note:''}`}>{p.title}</div>
      </div>
      <button onClick={()=>delPhase(p.id)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--dm)',fontSize:13,opacity:.4,marginLeft:6}}>×</button>
    </div>)}
  </div>;}
/* ── V6: QUICK LANG INPUT FOR DASHBOARD ── */
function QuickLangInput({data,upd}){
  const [selLang,setSelLang]=useState('de');const [selCat,setSelCat]=useState('vocabulary');const [text,setText]=useState('');const [vocabN,setVocabN]=useState(5);
  const lang=data.languages.find(l=>l.id===selLang);
  const add=()=>{
    if(selCat==='vocabulary'){
      // vocabulary: only increment total counter, never create list items
      const langs=data.languages.map(l=>{
        if(l.id!==selLang)return l;
        const cats={...(l.categories||defCats())};
        const vocab={...(cats.vocabulary||{total:0,weeklyGoal:50})};
        vocab.total=(vocab.total||0)+vocabN;
        cats.vocabulary=vocab;
        return{...l,categories:cats};
      });
      upd({languages:langs});
    } else {
      if(!text.trim())return;
      const langs=data.languages.map(l=>{
        if(l.id!==selLang)return l;
        const cats={...(l.categories||defCats())};
        const catD={...(cats[selCat]||{items:[]})};
        const ni={id:uid(),text:text.trim(),done:false};
        if(selCat==='writing')ni.link='';
        if(selCat==='grammar')ni.level='B1';
        catD.items=[ni,...(catD.items||[])];
        cats[selCat]=catD;
        return{...l,categories:cats};
      });
      upd({languages:langs});setText('');
    }
  };
  const vocab=lang?.categories?.vocabulary||{total:0};
  return<div className="card">
    <div className="lbl" style={{marginBottom:8}}>🌐 NGÔN NGỮ — QUICK LOG</div>
    <div style={{display:'flex',gap:5,marginBottom:7}}>
      {data.languages.map(l=><button key={l.id} className={selLang===l.id?'btn-p btn-sm':'btn-g btn-sm'} onClick={()=>setSelLang(l.id)}>{l.emoji} {l.name.split(' ')[1]}</button>)}
    </div>
    <div style={{display:'flex',gap:4,marginBottom:8,flexWrap:'wrap'}}>
      {[['vocabulary','📝','Từ vựng'],['grammar','📖','Ngữ pháp'],['speaking','🗣️','Nói'],['writing','✍️','Viết']].map(([k,e,lb])=><button key={k} onClick={()=>setSelCat(k)} style={{padding:'3px 8px',borderRadius:5,border:`1px solid ${selCat===k?(lang?.color||'var(--acc)'):'var(--bdr)'}`,background:selCat===k?(lang?.color+'22'||'var(--acc2)'):'transparent',color:selCat===k?(lang?.color||'var(--acc)'):'var(--mu)',cursor:'pointer',fontSize:10,fontWeight:selCat===k?700:400}}>{e} {lb}</button>)}
    </div>
    {selCat==='vocabulary'?<div>
      <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--sur)',borderRadius:8,padding:'8px 12px',marginBottom:6}}>
        <span className="tx-mu">Tổng từ:</span>
        <span style={{fontSize:20,fontWeight:800,color:lang?.color||'var(--acc)'}}>{vocab.total||0}</span>
        <span className="tx-mu">từ</span>
        <div style={{marginLeft:'auto',display:'flex',gap:5}}>
          {[1,5,10,25].map(n=><button key={n} className="btn-p btn-sm" onClick={()=>{const langs=data.languages.map(l=>{if(l.id!==selLang)return l;const cats={...(l.categories||defCats())};const v={...(cats.vocabulary||{total:0})};v.total=(v.total||0)+n;cats.vocabulary=v;return{...l,categories:cats};});upd({languages:langs});}}>{`+${n}`}</button>)}
        </div>
      </div>
      <div style={{fontSize:10,color:'var(--dm)'}}>💡 Từ vựng được log theo số lượng, không theo từng từ cụ thể</div>
    </div>:<div style={{display:'flex',gap:6}}>
      <input className="inp" value={text} onChange={e=>setText(e.target.value)}
        placeholder={selCat==='speaking'?'Topic đã luyện nói...':selCat==='writing'?'Tên bài viết đã làm...':'Điểm ngữ pháp mới...'}
        onKeyDown={e=>e.key==='Enter'&&add()} style={{flex:1,fontSize:12}}/>
      <button className="btn-p btn-sm" onClick={add}>Lưu</button>
    </div>}
    <div style={{marginTop:5,display:'flex',gap:12,flexWrap:'wrap'}}>
      {data.languages.map(l=><span key={l.id} style={{fontSize:10,color:'var(--mu)'}}>{l.emoji} {l.categories?.vocabulary?.total||0} từ</span>)}
    </div>
  </div>;}

function MiniCalendar({events,onDateSelect,selectedDate}){
  const [vy,setVy]=useState(new Date().getFullYear());
  const [vm,setVm]=useState(new Date().getMonth());
  const sel=selectedDate||TODAY;
  const firstDay=(new Date(vy,vm,1).getDay()+6)%7; // Mon=0, Tue=1, ... Sun=6
  const dim=new Date(vy,vm+1,0).getDate();
  const dip=new Date(vy,vm,0).getDate();
  const cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({day:dip-i,cur:false});
  for(let i=1;i<=dim;i++)cells.push({day:i,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-dim-firstDay+1,cur:false});
  const evByDate={};
  // Include recurring events for this calendar month
  for(let d=1;d<=dim;d++){const ds=`${vy}-${String(vm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;getEventsOnDate(events,ds).forEach(e=>{if(!evByDate[ds])evByDate[ds]=[];if(!evByDate[ds].find(x=>x.id===e.id))evByDate[ds].push(e);});}
  const TC={academic:'#7C6EF5',exam:'#E24B4A',language:'#FFD700',health:'#1D9E75',networking:'#4FA3FF',other:'#6B75A0'};
  const prev=()=>{if(vm===0){setVm(11);setVy(y=>y-1);}else setVm(m=>m-1);};
  const next=()=>{if(vm===11){setVm(0);setVy(y=>y+1);}else setVm(m=>m+1);};
  return<div>
    <div className="flex-sb" style={{marginBottom:7}}>
      <button className="btn-g btn-sm" onClick={prev}>‹</button>
      <span style={{fontSize:12,fontWeight:600}}>{MV[vm]} {vy}</span>
      <button className="btn-g btn-sm" onClick={next}>›</button>
    </div>
    <div className="cal-grid" style={{marginBottom:3}}>{['T2','T3','T4','T5','T6','T7','CN'].map(d=><div key={d} className="cal-hd">{d}</div>)}</div>
    <div className="cal-grid">{cells.map((c,i)=>{
      if(!c.cur)return<div key={i} className="cal-cell other-month"><span style={{fontSize:11,color:'var(--dm)'}}>{c.day}</span></div>;
      const ds=`${vy}-${String(vm+1).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
      const evs=evByDate[ds]||[];const isT=ds===TODAY;const isS=ds===sel;
      return<div key={i} className={`cal-cell ${isT?'today':''} ${isS&&!isT?'selected':''}`} onClick={()=>onDateSelect(ds)}>
        <div style={{fontSize:11,lineHeight:1.3}}>{c.day}</div>
        {evs.length>0&&<div className="cal-dots">{evs.slice(0,3).map((e,j)=><div key={j} className="cal-dot" style={{background:TC[e.type]||'#7C6EF5'}}/>)}</div>}
      </div>;
    })}</div>
  </div>;}
